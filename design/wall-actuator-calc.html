<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Position Wall Actuator Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #020617; 
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #020617 70%);
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Premium Range Slider */
        .slider { 
            -webkit-appearance: none; 
            width: 100%; 
            height: 6px; 
            border-radius: 999px; 
            background: #334155; 
            outline: none; 
            transition: background 0.2s;
        }
        .slider:hover { background: #475569; }
        .slider::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            appearance: none; 
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            background: #38bdf8; 
            cursor: pointer; 
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5), inset 0 0 0 4px #0f172a;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.7), inset 0 0 0 3px #0f172a;
        }
        .slider::-webkit-slider-thumb:active {
            transform: scale(0.95);
        }

        /* Glassmorphism panels */
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            // Inputs
            const [module, setModule] = useState(1.5);
            const [teeth, setTeeth] = useState(16);
            const [servoAngle, setServoAngle] = useState(140);
            const [marbleDiam, setMarbleDiam] = useState(14);
            const [position, setPosition] = useState('floor'); // 'hole', 'floor', 'wall'

            // Gear Math
            const pitchDiameter = module * teeth;
            const circumference = Math.PI * pitchDiameter;
            
            // Travel Math
            const maxTravel = circumference * (servoAngle / 360);
            const midTravel = maxTravel / 2; 
            
            // Requirements
            const idealWallHeight = marbleDiam + 4; 
            const idealHoleDepth = marbleDiam + 2;  
            const totalRequiredTravel = idealWallHeight + idealHoleDepth;
            
            const rackLength = maxTravel + (module * Math.PI * 4); 

            // Dimensions
            const wallWidth = pitchDiameter * 0.8;
            const wallThickness = pitchDiameter * 0.4;

            // Calculate actual travels
            const targetHole = midTravel - idealHoleDepth;
            const targetWall = midTravel + idealWallHeight;
            
            const actualHole = Math.max(0, targetHole);
            const actualFloor = midTravel;
            const actualWall = Math.min(maxTravel, targetWall);

            // Current state mapping
            let currentTravel = actualFloor;
            if (position === 'hole') currentTravel = actualHole;
            if (position === 'wall') currentTravel = actualWall;

            const currentRotation = (currentTravel / maxTravel) * servoAngle;

            const failsWall = actualWall < targetWall;
            const failsHole = actualHole > targetHole;

            const ControlGroup = ({ label, value, unit, min, max, step, onChange, desc }) => (
                <div className="mb-6">
                    <div className="flex justify-between items-end mb-2">
                        <div>
                            <label className="text-sm font-semibold text-slate-200">{label}</label>
                            {desc && <div className="text-xs text-slate-500 mt-0.5">{desc}</div>}
                        </div>
                        <div className="bg-slate-900/80 border border-slate-700 px-3 py-1 rounded-md shadow-inner">
                            <span className="font-mono text-sky-400 font-bold">{value}</span>
                            <span className="text-slate-500 text-xs ml-1">{unit}</span>
                        </div>
                    </div>
                    <input 
                        type="range" 
                        min={min} max={max} step={step} 
                        value={value} 
                        onChange={e => onChange(Number(e.target.value))} 
                        className="slider" 
                    />
                </div>
            );

            const StatCard = ({ label, value, unit, subtext, highlight }) => (
                <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 flex flex-col justify-between relative overflow-hidden group hover:bg-slate-800/80 transition-colors">
                    <div className={`absolute top-0 left-0 w-1 h-full ${highlight}`}></div>
                    <div>
                        <div className="text-xs font-medium text-slate-400 uppercase tracking-wider mb-1">{label}</div>
                        <div className="flex items-baseline gap-1">
                            <span className="text-2xl font-bold font-mono text-white">{value}</span>
                            <span className="text-sm text-slate-500 font-medium">{unit}</span>
                        </div>
                    </div>
                    {subtext && <div className="text-xs text-slate-500 mt-2">{subtext}</div>}
                </div>
            );

            return (
                <div className="max-w-7xl mx-auto p-4 sm:p-8">
                    {/* Header */}
                    <div className="mb-8 flex items-center justify-between">
                        <div>
                            <h1 className="text-3xl sm:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-blue-600 tracking-tight mb-2">
                                Actuator Kinematics
                            </h1>
                            <p className="text-slate-400 text-sm sm:text-base max-w-2xl">
                                Precision calculator for 3-position (Hole/Floor/Wall) rack & pinion mechanisms.
                            </p>
                        </div>
                        <div className="hidden sm:flex items-center gap-2 px-4 py-2 bg-slate-800/50 border border-slate-700 rounded-full">
                            <div className={`w-2 h-2 rounded-full ${(!failsWall && !failsHole) ? 'bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]' : 'bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.8)]'}`}></div>
                            <span className="text-xs font-semibold text-slate-300 uppercase tracking-wider">
                                {(!failsWall && !failsHole) ? 'System Valid' : 'Travel Error'}
                            </span>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                        
                        {/* Left Column: Controls */}
                        <div className="lg:col-span-4 flex flex-col gap-6">
                            <div className="glass-panel rounded-2xl p-6">
                                <div className="flex items-center gap-2 mb-6 pb-4 border-b border-slate-700/50">
                                    <svg className="w-5 h-5 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                                    <h2 className="text-lg font-semibold text-white">Parameters</h2>
                                </div>
                                
                                <ControlGroup label="Gear Module" desc="Tooth size standard" value={module.toFixed(1)} unit="M" min="0.8" max="3.0" step="0.1" onChange={setModule} />
                                <ControlGroup label="Gear Teeth" desc="Number of teeth on pinion" value={teeth} unit="T" min="8" max="40" step="1" onChange={setTeeth} />
                                <ControlGroup label="Servo Angle" desc="Usable sweep (buffer included)" value={servoAngle} unit="°" min="45" max="180" step="5" onChange={setServoAngle} />
                                <ControlGroup label="Marble Diameter" desc="Size of the projectile" value={marbleDiam} unit="mm" min="8" max="25" step="1" onChange={setMarbleDiam} />
                            </div>

                            <div className="glass-panel rounded-2xl p-6">
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-2">
                                        <svg className="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        <h2 className="text-lg font-semibold text-white">Live Test</h2>
                                    </div>
                                    <div className="text-xs font-mono text-slate-400 bg-slate-900 px-2 py-1 rounded">
                                        θ = {currentRotation.toFixed(1)}°
                                    </div>
                                </div>
                                
                                <div className="flex bg-slate-900/50 p-1 rounded-xl border border-slate-700/50 relative">
                                    <div className="absolute top-1 bottom-1 w-[calc(33.333%-4px)] bg-sky-500/20 border border-sky-500/30 rounded-lg transition-transform duration-300 ease-out" 
                                         style={{ transform: `translateX(${position === 'hole' ? '4px' : position === 'floor' ? 'calc(100% + 6px)' : 'calc(200% + 8px)'})` }}>
                                    </div>
                                    <button onClick={() => setPosition('hole')} className={`flex-1 py-3 text-sm font-bold z-10 transition-colors ${position === 'hole' ? 'text-sky-300' : 'text-slate-400 hover:text-slate-200'}`}>Hole</button>
                                    <button onClick={() => setPosition('floor')} className={`flex-1 py-3 text-sm font-bold z-10 transition-colors ${position === 'floor' ? 'text-sky-300' : 'text-slate-400 hover:text-slate-200'}`}>Floor</button>
                                    <button onClick={() => setPosition('wall')} className={`flex-1 py-3 text-sm font-bold z-10 transition-colors ${position === 'wall' ? 'text-sky-300' : 'text-slate-400 hover:text-slate-200'}`}>Wall</button>
                                </div>
                            </div>
                        </div>

                        {/* Right Column: Viz & Stats */}
                        <div className="lg:col-span-8 flex flex-col gap-6">
                            
                            {/* Visualizer */}
                            <div className="glass-panel rounded-2xl overflow-hidden flex flex-col h-[450px] relative">
                                <div className="absolute top-4 left-4 z-10 flex items-center gap-2">
                                    <div className="bg-slate-900/80 backdrop-blur border border-slate-700 px-3 py-1.5 rounded-lg flex items-center gap-2 shadow-lg">
                                        <div className="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                                        <span className="text-xs font-semibold tracking-wide text-slate-300">CAD PREVIEW</span>
                                    </div>
                                </div>

                                <div className="flex-1 relative flex items-center justify-center bg-[#0a0f1c] overflow-hidden">
                                    <svg width="100%" height="100%" viewBox="-150 -150 300 250" className="overflow-visible">
                                        <defs>
                                            {/* Blueprint Grid */}
                                            <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                                                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(56, 189, 248, 0.05)" strokeWidth="1"/>
                                            </pattern>
                                            <pattern id="grid-large" width="100" height="100" patternUnits="userSpaceOnUse">
                                                <rect width="100" height="100" fill="url(#grid)" />
                                                <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(56, 189, 248, 0.1)" strokeWidth="1"/>
                                            </pattern>

                                            {/* Gradients */}
                                            <linearGradient id="wallGrad" x1="0" y1="0" x2="1" y2="0">
                                                <stop offset="0%" stopColor="#f59e0b" />
                                                <stop offset="100%" stopColor="#b45309" />
                                            </linearGradient>
                                            <linearGradient id="rackGrad" x1="0" y1="0" x2="1" y2="0">
                                                <stop offset="0%" stopColor="#94a3b8" />
                                                <stop offset="100%" stopColor="#64748b" />
                                            </linearGradient>
                                            <radialGradient id="marbleGrad" cx="35%" cy="35%" r="65%">
                                                <stop offset="0%" stopColor="#ffffff" />
                                                <stop offset="40%" stopColor="#cbd5e1" />
                                                <stop offset="100%" stopColor="#475569" />
                                            </radialGradient>
                                            <linearGradient id="gearGrad" x1="0" y1="0" x2="1" y2="1">
                                                <stop offset="0%" stopColor="#38bdf8" />
                                                <stop offset="100%" stopColor="#0284c7" />
                                            </linearGradient>
                                            <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="0%" stopColor="#334155" />
                                                <stop offset="10%" stopColor="#1e293b" />
                                                <stop offset="100%" stopColor="#0f172a" />
                                            </linearGradient>
                                            
                                            {/* Drop Shadow */}
                                            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                                                <feDropShadow dx="0" dy="8" stdDeviation="6" floodColor="#000000" floodOpacity="0.6"/>
                                            </filter>
                                            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                                                <feDropShadow dx="0" dy="0" stdDeviation="4" floodColor="#38bdf8" floodOpacity="0.4"/>
                                            </filter>
                                        </defs>

                                        {/* Background Grid */}
                                        <rect x="-500" y="-500" width="1000" height="1000" fill="url(#grid-large)" />

                                        {/* Center Axis Line */}
                                        <line x1="0" y1="-200" x2="0" y2="200" stroke="rgba(56, 189, 248, 0.2)" strokeWidth="1" strokeDasharray="4 4" />

                                        {/* Floors */}
                                        <rect x="-300" y="-100" width={300 - wallWidth/2 - 1} height="40" fill="url(#floorGrad)" stroke="#475569" strokeWidth="1" />
                                        <rect x={wallWidth/2 + 1} y="-100" width="300" height="40" fill="url(#floorGrad)" stroke="#475569" strokeWidth="1" />
                                        <line x1="-300" y1="-100" x2="300" y2="-100" stroke="#64748b" strokeWidth="2" />

                                        {/* Marble */}
                                        <g style={{ opacity: position === 'hole' ? 0.15 : 1, transition: 'opacity 0.4s ease' }}>
                                            <circle cx="-40" cy={-100 - (marbleDiam/2)} r={marbleDiam/2} fill="url(#marbleGrad)" filter="url(#shadow)" />
                                        </g>
                                        <g style={{ opacity: position === 'hole' ? 1 : 0, transition: 'opacity 0.4s ease' }}>
                                            <circle cx="0" cy={-100 + (marbleDiam/2) + 5} r={marbleDiam/2} fill="url(#marbleGrad)" filter="url(#shadow)" />
                                        </g>

                                        {/* Wall / Rack Assembly */}
                                        <g transform={`translate(0, ${-(currentTravel - midTravel)})`} style={{ transition: 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)' }}>
                                            {/* Peg */}
                                            <rect x={-wallWidth/2} y={-100} width={wallWidth} height={180} fill="url(#wallGrad)" rx="3" filter="url(#shadow)" stroke="#fcd34d" strokeWidth="1" />
                                            
                                            {/* Rack */}
                                            <rect x={wallWidth/2} y={-100 + 20} width={10} height={rackLength} fill="url(#rackGrad)" stroke="#475569" strokeWidth="1" />
                                            {/* Rack Teeth */}
                                            <path d={`M ${wallWidth/2 + 10} ${-100 + 20} v ${rackLength}`} stroke="#cbd5e1" strokeWidth="4" strokeDasharray={`${module*Math.PI/2} ${module*Math.PI/2}`} />
                                        </g>

                                        {/* Gear */}
                                        <g transform={`translate(${wallWidth/2 + 10 + pitchDiameter/2}, ${-40})`}>
                                            <g transform={`rotate(${-currentRotation})`} style={{ transition: 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)' }}>
                                                {/* Gear Body */}
                                                <circle cx="0" cy="0" r={pitchDiameter/2} fill="url(#gearGrad)" filter="url(#shadow)" stroke="#0284c7" strokeWidth="1" />
                                                {/* Center Hub */}
                                                <circle cx="0" cy="0" r={pitchDiameter/6} fill="#0f172a" stroke="#38bdf8" strokeWidth="2" />
                                                <circle cx="0" cy="0" r="2" fill="#38bdf8" />
                                                {/* Spoke */}
                                                <line x1="0" y1={-pitchDiameter/6} x2="0" y2={-pitchDiameter/2} stroke="#0f172a" strokeWidth="3" opacity="0.5" />
                                                {/* Teeth */}
                                                <circle cx="0" cy="0" r={pitchDiameter/2 + module} fill="none" stroke="#7dd3fc" strokeWidth={module*1.8} strokeDasharray={`${module*Math.PI/2} ${module*Math.PI/2}`} />
                                            </g>
                                            <circle cx="0" cy="0" r={pitchDiameter/2 + module + 4} fill="none" stroke="rgba(56, 189, 248, 0.2)" strokeWidth="1" strokeDasharray="4 4" />
                                        </g>

                                        {/* Backing Guide */}
                                        <rect x={wallWidth/2 + 10 + pitchDiameter + 4} y="-90" width="12" height="100" fill="#1e293b" stroke="#334155" strokeWidth="2" rx="4" filter="url(#shadow)" />
                                        <line x1={wallWidth/2 + 10 + pitchDiameter + 8} y1="-80" x2={wallWidth/2 + 10 + pitchDiameter + 8} y2="0" stroke="#475569" strokeWidth="2" strokeLinecap="round" />
                                    </svg>
                                </div>
                            </div>

                            {/* Warning Banner */}
                            {(failsWall || failsHole) && (
                                <div className="bg-rose-500/10 border border-rose-500/30 rounded-xl p-4 flex items-start gap-4">
                                    <div className="bg-rose-500/20 p-2 rounded-full text-rose-400 mt-0.5">
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                    </div>
                                    <div>
                                        <h4 className="text-rose-400 font-semibold mb-1">Insufficient Travel</h4>
                                        <p className="text-rose-200/80 text-sm leading-relaxed">
                                            Gear is too small to reach all positions within {servoAngle}°. 
                                            {failsWall && ` Wall reaches ${(maxTravel - midTravel).toFixed(1)}mm (needs ${idealWallHeight.toFixed(1)}mm).`}
                                            {failsHole && ` Hole drops ${(midTravel).toFixed(1)}mm (needs ${idealHoleDepth.toFixed(1)}mm).`}
                                            <span className="block mt-2 text-rose-300 font-medium">Fix: Increase Gear Module or Teeth.</span>
                                        </p>
                                    </div>
                                </div>
                            )}

                            {/* Stats Grid */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <StatCard label="Pitch Dia." value={pitchDiameter.toFixed(1)} unit="mm" highlight="bg-sky-400" subtext="Effective gear size" />
                                <StatCard label="Max Stroke" value={maxTravel.toFixed(1)} unit="mm" highlight="bg-emerald-400" subtext={`Full ${servoAngle}° sweep`} />
                                <StatCard label="Peg Width" value={wallWidth.toFixed(1)} unit="mm" highlight="bg-amber-400" subtext="80% of pitch dia." />
                                <StatCard label="Rack Len." value={rackLength.toFixed(1)} unit="mm" highlight="bg-indigo-400" subtext="Includes end buffer" />
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
