        torqueNm: leg.torqueNm,
        rodAngleDeg: leg.rodAngleDeg,
        crankDeg: toDegrees(leg.beta)
      }));

      const lowestLeg = [...legSnapshots].sort((a, b) => a.supportDeltaM - b.supportDeltaM)[0];
      const motionPhase = displaySample.alphaRadS2 > 1e-6

      return (

            </div>
            <div className="sim-panel-body">
              <div className="scene-legend-list">
                {LEG_META.map((leg) => (
                  <div key={leg.name} className="scene-legend-item">
                    <span className="scene-dot" style={{ background: leg.css }} />
                    <div><strong>{leg.name}</strong> shows that motor shaft, crank, rod, underside support joint, and its current support-force arrow.</div>
                  </div>
                ))}
                <div className="scene-legend-item">
                  <span className="scene-dot" style={{ background: '#c7d1dd' }} />
                  <div><strong>Ghost prism</strong> is the level reference table. The rods mount to the bottom face of that prism, not its midplane.</div>
                </div>
                <div className="scene-legend-item">
                  <span className="scene-dot" style={{ background: '#ffb35a' }} />
                  <div><strong>Orange arrow on the table</strong> points downhill. It is a heading cue taken from the solver, not a support-force arrow.</div>
                </div>
              </div>
            </div>
          </section>

          <section className="sim-panel">
            <div className="sim-panel-header">
              <h3>Current Pose Cues</h3>
              <p>Plain-language callouts for the pose you are inspecting right now.</p>
            </div>
            <div className="sim-panel-body">
              <div className="scene-note-list">
                <div className="scene-note-item"><strong>Motion progress:</strong> {round(inspectProgress * 100, 0)}% of the level-to-target move.</div>
                <div className="scene-note-item"><strong>Downhill heading:</strong> {round(model.headingDeg, 1)}°. `0°` points toward +X, which is rightward in the plan view and 3D base layout.</div>
                <div className="scene-note-item"><strong>Highest underside joint:</strong> {highestLeg.meta.name} at {signed(toDisplayLength(highestLeg.supportDeltaM, model.unitSystem), 2)} {lengthUnit(model.unitSystem)} relative to the neutral underside support plane.</div>
                <div className="scene-note-item"><strong>Lowest underside joint:</strong> {lowestLeg.meta.name} at {signed(toDisplayLength(lowestLeg.supportDeltaM, model.unitSystem), 2)} {lengthUnit(model.unitSystem)} relative to the neutral underside support plane.</div>
                <div className="scene-note-item"><strong>COM offset at tilt:</strong> because the rod plane is on the bottom face while the table COM is at mid-thickness, the COM shifts laterally as the table tilts and the static support loads stop being perfectly equal.</div>
                <div className="scene-note-item"><strong>Signed angular acceleration:</strong> {round(displaySample.alphaRadS2, 4)} rad/s², which means the table is currently {motionPhase}.</div>
                <div className="scene-note-item"><strong>Scene frame:</strong> Y is vertical. X and Z span the base plane. Drag to orbit and scroll to zoom.</div>
              </div>
            </div>
          </section>

          <section className="sim-panel">
            <div className="sim-panel-header">
              <h3>Current Leg States</h3>
              <p>The same leg colors are reused in the 3D scene, the per-leg cards, and the static summary table below.</p>
            </div>
            <div className="sim-panel-body">
              <div className="pose-leg-grid">
                {legSnapshots.map((snapshot) => (
                  <div key={snapshot.index} className="pose-leg-card">
                    <div className="pose-leg-header">
                      <div className="pose-leg-title">
                        <span className="pose-leg-badge" style={{ background: snapshot.meta.css }}>{snapshot.meta.badgeText}</span>
                        <span>{snapshot.meta.name}</span>
                      </div>
                    </div>
                    <div className="pose-leg-meta">
                      <div className="pose-leg-meta-row">
                        <span>Underside joint</span>
                        <span className="mono">{signed(toDisplayLength(snapshot.supportDeltaM, model.unitSystem), 2)} {lengthUnit(model.unitSystem)}</span>
                      </div>
                      <div className="pose-leg-meta-row">
                        <span>Support force</span>
                        <span className="mono">{formatForce(snapshot.supportForceN, model.unitSystem)}</span>
                      </div>
                      <div className="pose-leg-meta-row">
                        <span>Motor torque</span>
                        <span className="mono">{formatTorque(snapshot.torqueNm, model.unitSystem)}</span>
                      </div>
                      <div className="pose-leg-meta-row">
                        <span>Crank angle</span>
                        <span className="mono">{round(snapshot.crankDeg, 2)}°</span>
                      </div>
                      <div className="pose-leg-meta-row">
                        <span>Rod angle</span>
                        <span className="mono">{round(snapshot.rodAngleDeg, 2)}°</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        </div>
      );
    }

    function ThreePlatformView({ model, displaySample, cameraPreset, showNeutralGhost, showForceArrows }) {
      const hostRef = useRef(null);
      const sceneRef = useRef(null);
      const [threeReady, setThreeReady] = useState(Boolean(window.ThreeTiltSim));
      const [threeError, setThreeError] = useState('');
      const [sceneReady, setSceneReady] = useState(false);

      useEffect(() => {
        let cancelled = false;
        const syncThreeStatus = () => {
          if (cancelled) {
            return;
          }
          if (window.ThreeTiltSimStatus === 'ready' && window.ThreeTiltSim) {
            setThreeReady(true);
            setThreeError('');
          } else if (window.ThreeTiltSimStatus === 'error') {
            setThreeError(window.ThreeTiltSimError || 'Failed to load Three.js modules.');
          }
        };

        syncThreeStatus();
        const pollId = window.setInterval(syncThreeStatus, 100);
        return () => {
          cancelled = true;
          window.clearInterval(pollId);
        };
      }, []);

      useEffect(() => {
        if (!threeReady || !hostRef.current || sceneRef.current) {
          return undefined;
        }

        const { THREE, OrbitControls } = window.ThreeTiltSim;
        const host = hostRef.current;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x101318);

        const camera = new THREE.PerspectiveCamera(42, 1, 0.01, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        host.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.enablePan = true;

        scene.add(new THREE.AmbientLight(0xcbd8e6, 0.84));
        scene.add(new THREE.HemisphereLight(0xf0f5ff, 0x202733, 1.4));
        const key = new THREE.DirectionalLight(0xfff0cb, 1.35);
        key.position.set(2.5, 4.5, 2.2);
        scene.add(key);
        const fill = new THREE.DirectionalLight(0x84b9ff, 0.75);
        fill.position.set(-3.2, 2.3, -2.8);
        scene.add(fill);
        const rim = new THREE.DirectionalLight(0xa4ffd7, 0.35);
        rim.position.set(0.8, 1.6, -4.4);
        scene.add(rim);

        let frameId = 0;
        let isResizing = false;

        const resize = () => {
          if (!host) return;
          const width = host.clientWidth;
          const height = host.clientHeight;
          if (width === 0 || height === 0) {
            if (!isResizing) {
              isResizing = true;
              frameId = window.requestAnimationFrame(() => {
                isResizing = false;
                resize();
              });
            }
            return;
          }
          renderer.setSize(width, height, false);
          camera.aspect = width / height;
          camera.updateProjectionMatrix();
        };

        const tick = () => {
          frameId = window.requestAnimationFrame(tick);
          controls.update();
          renderer.render(scene, camera);
        };

        const resizeObserver = new ResizeObserver(() => {
          resize();
        });
        resizeObserver.observe(host);
        
        resize();
        tick();

        sceneRef.current = {
          THREE,
          scene,
          camera,
          renderer,
          controls,
          dynamicGroup: null,
          resize
        };
        setSceneReady(true);

        return () => {
          setSceneReady(false);
          resizeObserver.disconnect();
          window.cancelAnimationFrame(frameId);
          if (sceneRef.current?.dynamicGroup) {
            disposeThreeObject(sceneRef.current.dynamicGroup);
            scene.remove(sceneRef.current.dynamicGroup);
          }
          controls.dispose();
          renderer.dispose();
          renderer.domElement.remove();
          sceneRef.current = null;
        };
      }, [threeReady]);

      useEffect(() => {
        if (!sceneReady) {
          return;
        }
        const state = sceneRef.current;
        if (!state) {
          return;
        }

        const { THREE, scene, camera, controls, renderer } = state;
        if (!displaySample) {
          if (state.dynamicGroup) {
            disposeThreeObject(state.dynamicGroup);
            scene.remove(state.dynamicGroup);
            state.dynamicGroup = null;
          }
          renderer.render(scene, camera);
          return;
        }
        if (state.dynamicGroup) {
          disposeThreeObject(state.dynamicGroup);
          scene.remove(state.dynamicGroup);
        }

        const group = new THREE.Group();
        const extent = Math.max(
          model.widthM * 1.3,
          model.lengthM * 1.3,
          model.baseRadiusM * 3.4,
          model.supportRadiusM * 3.4,
          Math.max(model.neutralHeightM, model.thicknessM) * 3.2,
          0.45
        );
        const baseThickness = Math.max(model.thicknessM * 0.16, 0.014);
        const baseWidth = Math.max(model.widthM * 1.12, model.baseRadiusM * 2.8);
        const baseDepth = Math.max(model.lengthM * 1.12, model.baseRadiusM * 2.8);
        const motorRadius = Math.max(Math.min(model.widthM, model.lengthM) * 0.022, 0.012);
        const motorHeight = Math.max(model.thicknessM * 0.28, 0.032);
        const jointRadius = motorRadius * 0.48;
        const crankRadius = Math.max(motorRadius * 0.18, 0.0065);
        const rodRadius = crankRadius * 0.62;
        const supportArrowMax = Math.max(...displaySample.legs.map((leg) => Math.abs(leg.supportForceN)), 1e-6);

        const grid = new THREE.GridHelper(extent * 1.35, 18, 0x2d3847, 0x1f2834);
        grid.position.y = model.shaftHeightM - 0.001;
        group.add(grid);

        const base = new THREE.Mesh(
          new THREE.BoxGeometry(baseWidth, baseThickness, baseDepth),
          new THREE.MeshStandardMaterial({ color: 0x1a2028, roughness: 0.88, metalness: 0.06 })
        );
        base.position.copy(sceneVectorFromModel(THREE, 0, 0, model.shaftHeightM - baseThickness / 2));
        group.add(base);

        const baseEdge = new THREE.LineSegments(
          new THREE.EdgesGeometry(new THREE.BoxGeometry(baseWidth, baseThickness, baseDepth)),
          new THREE.LineBasicMaterial({ color: 0x3f4b5a, transparent: true, opacity: 0.8 })
        );
        baseEdge.position.copy(base.position);
        group.add(baseEdge);

        const baseTrianglePoints = model.basePoints.map((point) => sceneVectorFromModel(THREE, point.x, point.y, model.shaftHeightM + motorHeight * 0.5));
        const baseTriangleGeometry = new THREE.BufferGeometry().setFromPoints([...baseTrianglePoints, baseTrianglePoints[0]]);
        const baseTriangle = new THREE.Line(baseTriangleGeometry, new THREE.LineBasicMaterial({ color: 0x4f6277, transparent: true, opacity: 0.85 }));
        group.add(baseTriangle);

        const currentNormal = currentTableNormal(THREE, displaySample);
        const currentCenter = sceneVectorFromModel(THREE, displaySample.pose.comPoint.x, displaySample.pose.comPoint.y, displaySample.pose.comPoint.z);
        const tableQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), currentNormal);

        if (showNeutralGhost) {
          const neutralTable = new THREE.Mesh(
            new THREE.BoxGeometry(model.widthM, model.thicknessM, model.lengthM),
            new THREE.MeshStandardMaterial({
              color: 0xc7d1dd,
              roughness: 0.32,
              metalness: 0.08,
              transparent: true,
              opacity: 0.15
            })
          );
          neutralTable.position.copy(sceneVectorFromModel(THREE, 0, 0, model.neutralHeightM));
          group.add(neutralTable);
          const neutralEdges = new THREE.LineSegments(
            new THREE.EdgesGeometry(new THREE.BoxGeometry(model.widthM, model.thicknessM, model.lengthM)),
            new THREE.LineBasicMaterial({ color: 0xd9e1ea, transparent: true, opacity: 0.25 })
          );
          neutralEdges.position.copy(neutralTable.position);
          group.add(neutralEdges);
        }

        const tableGroup = new THREE.Group();
        tableGroup.position.copy(currentCenter);
        tableGroup.quaternion.copy(tableQuat);

        const table = new THREE.Mesh(
          new THREE.BoxGeometry(model.widthM, model.thicknessM, model.lengthM),
          new THREE.MeshStandardMaterial({
            color: 0x33577b,
            roughness: 0.48,
            metalness: 0.16,
            transparent: true,
            opacity: 0.9
          })
        );
        tableGroup.add(table);

        const topFace = new THREE.Mesh(
          new THREE.BoxGeometry(model.widthM * 0.992, Math.max(model.thicknessM * 0.08, 0.004), model.lengthM * 0.992),
          new THREE.MeshStandardMaterial({
            color: 0x5f88ac,
            roughness: 0.32,
            metalness: 0.14,
            transparent: true,
            opacity: 0.84
          })
        );
        topFace.position.y = model.thicknessM * 0.47;
        tableGroup.add(topFace);

        const tableEdges = new THREE.LineSegments(
          new THREE.EdgesGeometry(new THREE.BoxGeometry(model.widthM, model.thicknessM, model.lengthM)),
          new THREE.LineBasicMaterial({ color: 0xe5eef7, transparent: true, opacity: 0.72 })
        );
        tableGroup.add(tableEdges);

        group.add(tableGroup);

        const supportTrianglePoints = displaySample.pose.topPoints.map((point) => sceneVectorFromModel(THREE, point.x, point.y, point.z));
        const supportTriangle = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([...supportTrianglePoints, supportTrianglePoints[0]]),
          new THREE.LineBasicMaterial({ color: 0xbcdfff, transparent: true, opacity: 0.9 })
        );
        group.add(supportTriangle);

        const downhillArrowOrigin = currentCenter.clone().add(currentNormal.clone().multiplyScalar(model.thicknessM * 0.58 + 0.01));
        const downhillArrow = new THREE.ArrowHelper(
          downhillSceneVector(THREE, model.headingRad, displaySample.thetaRad),
          downhillArrowOrigin,
          Math.min(model.widthM, model.lengthM) * 0.22,
          0xffb35a,
          Math.max(Math.min(model.widthM, model.lengthM) * 0.05, 0.024),
          Math.max(Math.min(model.widthM, model.lengthM) * 0.025, 0.012)
        );
        group.add(downhillArrow);

        displaySample.legs.forEach((leg, legIndex) => {
          const legMeta = LEG_META[legIndex];
          const points = legWorldPoints(THREE, model, displaySample, legIndex);
          if (!points) {
            return;
          }

          const shaftBody = new THREE.Mesh(
            new THREE.CylinderGeometry(motorRadius, motorRadius, motorHeight, 24),
            new THREE.MeshStandardMaterial({ color: 0x1f2730, roughness: 0.56, metalness: 0.26 })
          );
          shaftBody.position.copy(points.shaft);
          group.add(shaftBody);

          const shaftCap = new THREE.Mesh(
            new THREE.CylinderGeometry(motorRadius * 0.55, motorRadius * 0.55, motorHeight * 0.22, 18),
            new THREE.MeshStandardMaterial({ color: legMeta.color, roughness: 0.32, metalness: 0.18 })
          );
          shaftCap.position.copy(points.shaft).add(new THREE.Vector3(0, motorHeight * 0.39, 0));
          group.add(shaftCap);

          group.add(createCylinderBetweenPoints(THREE, points.shaft, points.crankPin, crankRadius, {
            color: legMeta.color,
            roughness: 0.28,
            metalness: 0.2
          }));

          group.add(createCylinderBetweenPoints(THREE, points.crankPin, points.support, rodRadius, {
            color: legMeta.color,
            roughness: 0.36,
            metalness: 0.16,
            opacity: 0.95
          }));

          const crankJoint = new THREE.Mesh(
            new THREE.SphereGeometry(jointRadius, 18, 18),
            new THREE.MeshStandardMaterial({ color: legMeta.color, roughness: 0.22, metalness: 0.38 })
          );
          crankJoint.position.copy(points.crankPin);
          group.add(crankJoint);

          const supportJoint = new THREE.Mesh(
            new THREE.SphereGeometry(jointRadius * 1.05, 18, 18),
            new THREE.MeshStandardMaterial({ color: legMeta.color, roughness: 0.22, metalness: 0.42 })
          );
          supportJoint.position.copy(points.support);
          group.add(supportJoint);

          if (showForceArrows) {
            const forceLength = 0.06 + 0.2 * (Math.abs(leg.supportForceN) / supportArrowMax);
            const forceDirection = leg.supportForceN >= 0 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(0, -1, 0);
            const origin = points.support.clone().add(new THREE.Vector3(0, leg.supportForceN >= 0 ? 0.006 : -0.006, 0));
            const arrow = new THREE.ArrowHelper(
              forceDirection,
              origin,
              forceLength,
              legMeta.color,
              forceLength * 0.24,
              forceLength * 0.12
            );
            group.add(arrow);
          }
        });

        const axesHelper = new THREE.AxesHelper(Math.min(model.widthM, model.lengthM) * 0.14);
        axesHelper.position.copy(sceneVectorFromModel(THREE, -baseWidth * 0.42, -baseDepth * 0.42, model.shaftHeightM + 0.002));
        group.add(axesHelper);

        scene.add(group);
        state.dynamicGroup = group;

        const target = currentCenter.clone();
        controls.target.copy(target);
        controls.minDistance = extent * 0.32;
        controls.maxDistance = extent * 5.8;
        const shouldResetCamera =
          state.lastCameraPreset !== cameraPreset ||
          !Number.isFinite(state.lastCameraExtent) ||
          Math.abs(state.lastCameraExtent - extent) > 1e-6 ||
          (cameraPreset === 'downhill' && Math.abs((state.lastCameraHeadingRad ?? Number.NaN) - model.headingRad) > 1e-6);

        if (shouldResetCamera) {
          const direction = sceneCameraDirection(THREE, cameraPreset, model.headingRad);
          const distance = extent * (cameraPreset === 'top' ? 1.8 : 1.65);
          camera.position.copy(target).addScaledVector(direction, distance);
          camera.lookAt(target);
          state.lastCameraPreset = cameraPreset;
          state.lastCameraExtent = extent;
          state.lastCameraHeadingRad = model.headingRad;
        }
        controls.update();
        renderer.render(scene, camera);
      }, [sceneReady, model, displaySample, cameraPreset, showNeutralGhost, showForceArrows]);

      if (threeError) {
        return (
          <div className="three-loading">
            Could not load the Three.js scene.<br />
            {threeError}
          </div>
        );
      }

      if (!threeReady) {
        return (
          <div className="three-loading">
            Loading Three.js scene and building the 3D platform model...
          </div>
        );
      }

      return (
        <div className="three-wrap">
          <div ref={hostRef} className="three-canvas-host" />
          <div className="three-overlay">
            {displaySample ? (
              <>
                <div className="scene-chip">Orange arrow = downhill heading used by the solver, not a force vector.</div>
                <div className="scene-chip">Colored shafts, cranks, rods, and arrows belong to the same leg.</div>
                <div className="scene-chip">Drag to orbit. Scroll to zoom. The pale ghost prism is the level reference.</div>
              </>
            ) : (
              <>
                <div className="scene-chip">Current geometry has no valid 3D pose.</div>
                <div className="scene-chip">Increase crank length, rod length, or neutral height until the level pose becomes reachable.</div>
              </>
            )}
          </div>
        </div>
      );
    }

    function DetailPane({ model, displaySample, detailTab, setDetailTab, sweepView, setSweepView }) {
      const legSnapshots = displaySample?.legs?.map((leg, index) => ({
        index,
        meta: LEG_META[index],
        supportDeltaM: leg.topZ - model.supportPlaneCenterHeightM,
        supportForceN: leg.supportForceN,
        torqueNm: leg.torqueNm,
        rodAngleDeg: leg.rodAngleDeg,
        crankDeg: toDegrees(leg.beta)
      })) ?? [];

      const highestLeg = legSnapshots.length ? [...legSnapshots].sort((a, b) => b.supportDeltaM - a.supportDeltaM)[0] : null;
      const lowestLeg = legSnapshots.length ? [...legSnapshots].sort((a, b) => a.supportDeltaM - b.supportDeltaM)[0] : null;
      const currentPeakTorque = legSnapshots.length ? Math.max(...legSnapshots.map((leg) => leg.torqueNm)) : 0;
      const currentPeakSupport = legSnapshots.length ? Math.max(...legSnapshots.map((leg) => Math.abs(leg.supportForceN))) : 0;

      return (
        <section className="sim-panel detail-panel">
          <div className="sim-panel-header detail-panel-header">
            <div>
              <h2>Analysis</h2>
              <p>Secondary detail lives here so the main scene and key sizing metrics can stay visible at all times.</p>
            </div>
            <div className="chip-row detail-tabs">
              <button className={`chip-button ${detailTab === 'overview' ? 'is-active' : ''}`} onClick={() => setDetailTab('overview')}>Overview</button>
              <button className={`chip-button ${detailTab === 'legs' ? 'is-active' : ''}`} onClick={() => setDetailTab('legs')}>Legs</button>
              <button className={`chip-button ${detailTab === 'sweeps' ? 'is-active' : ''}`} onClick={() => setDetailTab('sweeps')}>Sweeps</button>
              <button className={`chip-button ${detailTab === 'notes' ? 'is-active' : ''}`} onClick={() => setDetailTab('notes')}>Notes</button>
            </div>
          </div>
          <div className="sim-panel-body detail-panel-body">
            {detailTab === 'overview' ? (
              <div className="detail-tab-content">
                <div className="status-strip">
                  <div className={`status-pill ${model.warnings.length ? 'warn' : 'good'}`}>
                    {model.warnings.length ? `${model.warnings.length} geometry warning${model.warnings.length > 1 ? 's' : ''}` : 'No geometry warnings'}
                  </div>
                  <div className={`status-pill ${model.actualReachableTiltDeg + 1e-6 >= model.targetTiltDeg ? 'good' : 'warn'}`}>
                    Reachable {round(model.actualReachableTiltDeg, 2)}°
                  </div>
                  <div className="status-pill">Support stroke {formatLength(model.requiredSupportStrokeM, model.unitSystem)}</div>
                </div>

                <div className="detail-summary-grid">
                  <MiniStatCard label="Peak rod axial" value={formatForce(model.peakDynamicAxialForce, model.unitSystem)} />
                  <MiniStatCard label="Max rod angle" value={`${round(model.maxRodAngleDeg, 1)}°`} />
                  <MiniStatCard label="Min crank for target" value={model.minimumCrankRadiusM ? formatLength(model.minimumCrankRadiusM, model.unitSystem) : 'No solution'} tone={model.minimumCrankRadiusM ? '' : 'danger'} />
                  <MiniStatCard label="Level load / leg" value={formatForce(model.staticSupportForceN, model.unitSystem)} />
                </div>

                <div className="detail-block">
                  <div className="detail-block-title">Sizing assistant</div>
                  <div className="results-grid">
                    <StatCard
                      label="Selected motor"
                      value={model.selectedMotor.shortLabel}
                      tone={model.selectedMotorCanDrive ? 'good' : 'danger'}
                      note={`Available ${formatTorque(model.selectedMotor.torqueNm, model.unitSystem)}. Current geometry uses ${round(model.selectedMotorUsageRatio * 100, 1)}% of that after the safety factor.`}
                    />
                    <StatCard
                      label="Smallest viable listed motor"
                      value={model.recommendedMotorOption ? model.recommendedMotorOption.shortLabel : 'No listed fit'}
                      tone={model.recommendedMotorOption ? 'good' : 'danger'}
                      note={model.recommendedMotorOption
                        ? `Current design needs ${formatTorque(model.recommendedTorqueNm, model.unitSystem)} with margin included.`
                        : `Current design needs ${formatTorque(model.recommendedTorqueNm, model.unitSystem)} and exceeds every listed motor option.`}
                    />
                    <StatCard
                      label="Crank length"
                      value={model.sizingGuides.crank.valueM != null ? formatLength(model.sizingGuides.crank.valueM, model.unitSystem) : 'No fit'}
                      tone={model.sizingGuides.crank.tone}
                      note={model.sizingGuides.crank.note}
                    />
                    <StatCard
                      label="Rod length"
                      value={model.sizingGuides.rod.valueM != null ? formatLength(model.sizingGuides.rod.valueM, model.unitSystem) : 'No fit'}
                      tone={model.sizingGuides.rod.tone}
                      note={model.sizingGuides.rod.note}
                    />
                    <StatCard
                      label="Motor radius"
                      value={model.sizingGuides.baseRadius.valueM != null ? formatLength(model.sizingGuides.baseRadius.valueM, model.unitSystem) : 'No fit'}
                      tone={model.sizingGuides.baseRadius.tone}
                      note={model.sizingGuides.baseRadius.note}
                    />
                    <StatCard
                      label="Mounting radius"
                      value={model.sizingGuides.supportRadius.valueM != null ? formatLength(model.sizingGuides.supportRadius.valueM, model.unitSystem) : 'No fit'}
                      tone={model.sizingGuides.supportRadius.tone}
                      note={model.sizingGuides.supportRadius.note}
                    />
                  </div>
                </div>

                {displaySample ? (
                  <div className="detail-block">
                    <div className="detail-block-title">Current pose</div>
                    <div className="detail-grid-2">
                      <MiniStatCard label="Current tilt" value={`${round(toDegrees(displaySample.thetaRad), 2)}°`} subtext={`t = ${round(displaySample.t, 2)} s`} />
                      <MiniStatCard label="Current peak torque" value={formatTorque(currentPeakTorque, model.unitSystem)} />
                      <MiniStatCard label="Current peak support" value={formatForce(currentPeakSupport, model.unitSystem)} />
                      <MiniStatCard label="Accel sign" value={`${round(displaySample.alphaRadS2, 3)} rad/s²`} subtext={displaySample.alphaRadS2 >= 0 ? 'tilt is increasing' : 'tilt is braking'} />
                    </div>
                  </div>
                ) : null}

                <div className="detail-block">
                  <div className="detail-block-title">Motor options</div>
                  <table className="detail-table compact-table">
                    <thead>
                      <tr>
                        <th>Motor</th>
                        <th>Available</th>
                        <th>Usage</th>
                        <th>Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      {model.motorOptionRows.map((row) => (
                        <tr key={row.key}>
                          <td>{row.label}{row.key === model.selectedMotor.key ? ' (selected)' : ''}</td>
                          <td className="mono">{formatTorque(row.torqueNm, model.unitSystem)}</td>
                          <td className="mono">{round(row.usageRatio * 100, 1)}%</td>
                          <td>{row.fits ? (row.usageRatio <= 0.75 ? 'Good margin' : 'Near limit') : 'Too small'}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div className="detail-block">
                  <div className="detail-block-title">Warnings</div>
                  {model.warnings.length ? (
                    <ul className="warning-list compact-list">
                      {model.warnings.slice(0, 3).map((warning, index) => (
                        <li key={index} className={`warning-item ${warning.kind === 'warn' ? 'warn' : ''}`}>{warning.text}</li>
                      ))}
                    </ul>
                  ) : (
                    <div className="mini-note good">No first-pass geometry warnings are active for the current design point.</div>
                  )}
                </div>

                <div className="detail-block">
                  <div className="detail-block-title">Validation</div>
                  <ul className="validation-list compact-list">
                    {model.validations.map((validation, index) => (
                      <li key={index} className="validation-item">
                        <strong>{validation.label}:</strong> {validation.value}
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            ) : null}

            {detailTab === 'legs' ? (
              <div className="detail-tab-content">
                {displaySample ? (
                  <>
                    <div className="detail-block">
                      <div className="detail-block-title">Current pose leg states</div>
                      <table className="detail-table compact-table">
                        <thead>
                          <tr>
                            <th>Leg</th>
                            <th>Underside joint</th>
                            <th>Support</th>
                            <th>Torque</th>
                          </tr>
                        </thead>
                        <tbody>
                          {legSnapshots.map((snapshot) => (
                            <tr key={snapshot.index}>
                              <td className="mono">
                                <span className="leg-row-label">
                                  <span style={{ background: snapshot.meta.css }} />
                                  {snapshot.meta.badgeText}
                                </span>
                              </td>
                              <td className="mono">{signed(toDisplayLength(snapshot.supportDeltaM, model.unitSystem), 2)} {lengthUnit(model.unitSystem)}</td>
                              <td className="mono">{formatForce(snapshot.supportForceN, model.unitSystem)}</td>
                              <td className="mono">{formatTorque(snapshot.torqueNm, model.unitSystem)}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>

                    <div className="detail-summary-grid">
                      <MiniStatCard label="Highest joint" value={highestLeg ? highestLeg.meta.badgeText : '--'} subtext={highestLeg ? `${signed(toDisplayLength(highestLeg.supportDeltaM, model.unitSystem), 2)} ${lengthUnit(model.unitSystem)}` : ''} />
                      <MiniStatCard label="Lowest joint" value={lowestLeg ? lowestLeg.meta.badgeText : '--'} subtext={lowestLeg ? `${signed(toDisplayLength(lowestLeg.supportDeltaM, model.unitSystem), 2)} ${lengthUnit(model.unitSystem)}` : ''} />
                    </div>
                  </>
                ) : (
                  <div className="mini-note">Current geometry does not have a valid pose yet, so live leg values are unavailable.</div>
                )}

                <div className="detail-block">
                  <div className="detail-block-title">Static hold at max tilt</div>
                  <table className="detail-table compact-table">
                    <thead>
                      <tr>
                        <th>Leg</th>
                        <th>Force</th>
                        <th>Torque</th>
                        <th>Rod angle</th>
                      </tr>
                    </thead>
                    <tbody>
                      {model.staticLegRows.map((row) => (
                        <tr key={row.legIndex}>
                          <td className="mono">
                            <span className="leg-row-label">
                              <span style={{ background: LEG_META[row.legIndex].css }} />
                              {LEG_META[row.legIndex].badgeText}
                            </span>
                          </td>
                          <td className="mono">{formatForce(row.supportForceN, model.unitSystem)}</td>
                          <td className="mono">{formatTorque(row.torqueNm, model.unitSystem)}</td>
                          <td className="mono">{round(row.rodAngleDeg, 1)}°</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            ) : null}

            {detailTab === 'sweeps' ? (
              <div className="detail-tab-content">
                <div className="chip-row">
                  <button className={`chip-button ${sweepView === 'crank' ? 'is-active' : ''}`} onClick={() => setSweepView('crank')}>Crank sweep</button>
                  <button className={`chip-button ${sweepView === 'rod' ? 'is-active' : ''}`} onClick={() => setSweepView('rod')}>Rod sweep</button>
                  <button className={`chip-button ${sweepView === 'baseRadius' ? 'is-active' : ''}`} onClick={() => setSweepView('baseRadius')}>Motor radius sweep</button>
                  <button className={`chip-button ${sweepView === 'support' ? 'is-active' : ''}`} onClick={() => setSweepView('support')}>Mounting sweep</button>
                </div>
                {sweepView === 'crank' ? (
                  <ScaleChart
                    title="Required Motor Torque vs Crank Length"
                    subtitle="One-axis sweep with the selected safety factor included."
                    xLabel={`Crank length (${lengthUnit(model.unitSystem)})`}
                    yLabel={`Required motor torque (${torqueUnit(model.unitSystem)})`}
                    data={model.torqueSweep}
                    xAccessor={(entry) => toDisplayLength(entry.crankRadiusM, model.unitSystem)}
                    yAccessor={(entry) => entry.feasible ? toDisplayTorque(entry.requiredMotorTorqueNm, model.unitSystem) : NaN}
                    currentX={toDisplayLength(model.crankRadiusM, model.unitSystem)}
                    currentY={Number.isFinite(model.recommendedTorqueNm) ? toDisplayTorque(model.recommendedTorqueNm, model.unitSystem) : NaN}
                    unitSystem={model.unitSystem}
                    xFormatter={(value) => round(value, 2)}
                    yFormatter={(value) => round(value, 2)}
                  />
                ) : sweepView === 'rod' ? (
                  <ScaleChart
                    title="Peak Rod Angle vs Rod Length"
                    subtitle="Longer rods reduce articulation but take more packaging room."
                    xLabel={`Rod length (${lengthUnit(model.unitSystem)})`}
                    yLabel="Peak rod angle (deg)"
                    data={model.rodSweep}
                    xAccessor={(entry) => toDisplayLength(entry.rodLengthM, model.unitSystem)}
                    yAccessor={(entry) => entry.feasible ? entry.maxRodAngleDeg : NaN}
                    currentX={toDisplayLength(model.rodLengthM, model.unitSystem)}
                    currentY={model.maxRodAngleDeg}
                    unitSystem={model.unitSystem}
                    xFormatter={(value) => round(value, 2)}
                    yFormatter={(value) => round(value, 1)}
                  />
                ) : sweepView === 'baseRadius' ? (
                  <ScaleChart
                    title="Required Motor Torque vs Motor Radius"
                    subtitle="Plan-view motor placement changes the linkage leverage and packaging."
                    xLabel={`Motor radius (${lengthUnit(model.unitSystem)})`}
                    yLabel={`Required motor torque (${torqueUnit(model.unitSystem)})`}
                    data={model.baseRadiusSweep}
                    xAccessor={(entry) => toDisplayLength(entry.baseRadiusM, model.unitSystem)}
                    yAccessor={(entry) => entry.feasible ? toDisplayTorque(entry.requiredMotorTorqueNm, model.unitSystem) : NaN}
                    currentX={toDisplayLength(model.baseRadiusM, model.unitSystem)}
                    currentY={Number.isFinite(model.recommendedTorqueNm) ? toDisplayTorque(model.recommendedTorqueNm, model.unitSystem) : NaN}
                    unitSystem={model.unitSystem}
                    xFormatter={(value) => round(value, 2)}
                    yFormatter={(value) => round(value, 2)}
                  />
                ) : (
                  <ScaleChart
                    title="Reachable Tilt vs Mounting Radius"
                    subtitle="Larger mounting radius gives more leverage on the table, but it costs stroke and torque."
                    xLabel={`Mounting radius (${lengthUnit(model.unitSystem)})`}
                    yLabel="Reachable tilt (deg)"
                    data={model.supportSweep}
                    xAccessor={(entry) => toDisplayLength(entry.supportRadiusM, model.unitSystem)}
                    yAccessor={(entry) => entry.reachableTiltDeg}
                    currentX={toDisplayLength(model.supportRadiusM, model.unitSystem)}
                    currentY={model.actualReachableTiltDeg}
                    unitSystem={model.unitSystem}
                    xFormatter={(value) => round(value, 2)}
                    yFormatter={(value) => round(value, 2)}
                  />
                )}
              </div>
            ) : null}

            {detailTab === 'notes' ? (
              <div className="detail-tab-content">
                <div className="detail-block">
                  <div className="detail-block-title">Engineering notes</div>
                  <ul className="validation-list compact-list">
                    <li className="validation-item"><strong>Mounting radius</strong> raises stroke demand as it moves the underside joint farther from the tilt axis.</li>
                    <li className="validation-item"><strong>Crank length</strong> increases support travel, but also changes singularity exposure and torque conversion.</li>
                    <li className="validation-item"><strong>Rod length</strong> mainly governs articulation angle, linearity, and packaging, not raw tilt authority.</li>
                    <li className="validation-item"><strong>Motor radius</strong> changes the plan-view separation between the shaft and underside joint, which affects crank angles and available assembly room.</li>
                    <li className="validation-item"><strong>Rod orientation</strong> should be chosen for modest rod angle, low interference, and comfortable crank posture, not for one “always best” direction.</li>
                  </ul>
                </div>
                <div className="detail-block">
                  <div className="detail-block-title">Assumptions</div>
                  <div className="mini-note">
                    Ball mass is fixed at zero. The table is a uniform rectangular prism. Rods mount to the bottom face. Friction, backlash, joint compliance, structural flex, and motor speed limits are intentionally outside this first-pass sizing model.
                  </div>
                </div>
              </div>
            ) : null}
          </div>
        </section>
      );
    }

    function App() {
      const initialPreset = PRESETS.prototype36;
      const [unitSystem, setUnitSystem] = useState(initialPreset.unitSystem);
      const [presetKey, setPresetKey] = useState(initialPreset.key);
      const [massMode, setMassMode] = useState(initialPreset.massMode);
      const [widthM, setWidthM] = useState(initialPreset.widthM);
      const [lengthM, setLengthM] = useState(initialPreset.lengthM);
      const [thicknessM, setThicknessM] = useState(initialPreset.thicknessM);
      const [massKg, setMassKg] = useState(initialPreset.massKg);
      const [densityKgM3, setDensityKgM3] = useState(initialPreset.densityKgM3);
      const [targetTiltDeg, setTargetTiltDeg] = useState(initialPreset.targetTiltDeg);
      const [headingDeg, setHeadingDeg] = useState(initialPreset.headingDeg);
      const [moveTimeS, setMoveTimeS] = useState(initialPreset.moveTimeS);
      const [motorKey, setMotorKey] = useState(initialPreset.motorKey);
      const [baseRadiusM, setBaseRadiusM] = useState(initialPreset.baseRadiusM);
      const [supportRadiusM, setSupportRadiusM] = useState(initialPreset.supportRadiusM);
      const [crankRadiusM, setCrankRadiusM] = useState(initialPreset.crankRadiusM);
      const [rodLengthM, setRodLengthM] = useState(initialPreset.rodLengthM);
      const [neutralHeightM, setNeutralHeightM] = useState(initialPreset.neutralHeightM);
      const [shaftHeightM, setShaftHeightM] = useState(initialPreset.shaftHeightM);
      const [safetyFactor, setSafetyFactor] = useState(initialPreset.safetyFactor);
      const [inspectProgress, setInspectProgress] = useState(1);
      const [isPlaying, setIsPlaying] = useState(false);
      const [cameraPreset, setCameraPreset] = useState('isometric');
      const [showNeutralGhost, setShowNeutralGhost] = useState(true);
      const [showForceArrows, setShowForceArrows] = useState(true);
      const [detailTab, setDetailTab] = useState('overview');
      const [sweepView, setSweepView] = useState('crank');

      useEffect(() => {
        if (!isPlaying) {
          return undefined;
        }
        const interval = window.setInterval(() => {
          setInspectProgress((current) => {
            const next = current + 0.01;
            return next > 1 ? 0 : next;
          });
        }, 40);
        return () => window.clearInterval(interval);
      }, [isPlaying]);

      const config = {
        unitSystem,
        massMode,
        widthM: clamp(widthM, 0.08, 5),
        lengthM: clamp(lengthM, 0.08, 5),
        thicknessM: clamp(thicknessM, 0.005, 1),
        massKg: clamp(massKg, 0.01, 500),
        densityKgM3: clamp(densityKgM3, 1, 5000),
        targetTiltDeg: clamp(targetTiltDeg, 0.1, 12),
        headingDeg: ((headingDeg % 360) + 360) % 360,
        moveTimeS: clamp(moveTimeS, 0.2, 30),
        motorKey,
        baseRadiusM: clamp(baseRadiusM, 0.01, 2),
        supportRadiusM: clamp(supportRadiusM, 0.01, 2),
        crankRadiusM: clamp(crankRadiusM, 0.001, 0.4),
        rodLengthM: clamp(rodLengthM, 0.003, 2),
        neutralHeightM: clamp(neutralHeightM, -0.2, 2),
        shaftHeightM: clamp(shaftHeightM, -0.2, 1),
        safetyFactor: clamp(safetyFactor, 1, 5)
      };

      const model = useMemo(() => evaluateModel(config), [JSON.stringify(config)]);

      const displaySample = useMemo(() => {
        if (!model.samples.length) {
          return null;
        }
        const index = Math.min(model.samples.length - 1, Math.round(clamp(inspectProgress, 0, 1) * (model.samples.length - 1)));
        return model.samples[index];
      }, [model, inspectProgress]);

      const currentPoseTiltDeg = displaySample ? toDegrees(displaySample.thetaRad) : 0;
      const currentPosePeakTorqueNm = displaySample ? Math.max(...displaySample.legs.map((leg) => leg.torqueNm)) : 0;
      const currentPosePeakSupportN = displaySample ? Math.max(...displaySample.legs.map((leg) => Math.abs(leg.supportForceN))) : 0;

      const applyPreset = (preset) => {
        setPresetKey(preset.key);
        setUnitSystem(preset.unitSystem);
        setMassMode(preset.massMode);
        setWidthM(preset.widthM);
        setLengthM(preset.lengthM);
        setThicknessM(preset.thicknessM);
        setMassKg(preset.massKg);
        setDensityKgM3(preset.densityKgM3);
        setTargetTiltDeg(preset.targetTiltDeg);
        setHeadingDeg(preset.headingDeg);
        setMoveTimeS(preset.moveTimeS);
        setMotorKey(preset.motorKey);
        setBaseRadiusM(preset.baseRadiusM);
        setSupportRadiusM(preset.supportRadiusM);
        setCrankRadiusM(preset.crankRadiusM);
        setRodLengthM(preset.rodLengthM);
        setNeutralHeightM(preset.neutralHeightM);
        setShaftHeightM(preset.shaftHeightM);
        setSafetyFactor(preset.safetyFactor);
        setInspectProgress(1);
      };

      return (
        <div className="sim-shell">
          <section className="sim-header">
            <div className="header-main">
              <div className="workspace-tag">Motor catalog • 3 symmetric crank legs</div>
              <h1>3-Motor Tilt Table Simulator</h1>
              <p>
                Single-screen sizing bench for an underside-mounted 120° tilt platform. Compare your listed motors and sweep crank length, rod length, motor radius, and mounting radius without losing the 3D scene.
              </p>
              <div className="sim-summary">
                <div className="summary-chip"><strong>Motion target</strong>{round(model.targetTiltDeg, 2)}° in {round(model.moveTimeS, 2)} s</div>
                <div className="summary-chip"><strong>Reachable tilt</strong>{round(model.actualReachableTiltDeg, 2)}° with current geometry</div>
                <div className="summary-chip"><strong>Selected motor</strong>{model.selectedMotor.shortLabel} ({formatTorque(model.selectedMotor.torqueNm, model.unitSystem)})</div>
                <div className="summary-chip"><strong>Required with margin</strong>{formatTorque(model.recommendedTorqueNm, model.unitSystem)}{model.selectedMotorCanDrive ? ` • ${round(model.selectedMotorUsageRatio * 100, 1)}% used` : ` • over by ${formatTorque(model.recommendedTorqueNm - model.selectedMotor.torqueNm, model.unitSystem)}`}</div>
              </div>
            </div>
            <div className="toggle-row">
              <button className={`chip-button ${unitSystem === 'imperial' ? 'is-active' : ''}`} onClick={() => setUnitSystem('imperial')}>Imperial</button>
              <button className={`chip-button ${unitSystem === 'metric' ? 'is-active' : ''}`} onClick={() => setUnitSystem('metric')}>Metric</button>
            </div>
          </section>

          <div className="sim-grid">
            <aside className="sim-sidebar">
              <section className="sim-panel control-panel">
                <div className="sim-panel-header">
                  <h2>Inputs</h2>
                  <p>Compact controls grouped by intent so the geometry model never loses space.</p>
                </div>
                <div className="sim-panel-body">
                  <div className="control-sections">
                    <div className="control-section">
                      <div className="control-section-header">
                        <h3>Table</h3>
                        <p>Footprint, thickness, preset, and mass definition.</p>
                      </div>
                      <div className="control-grid compact-grid">
                        <SelectField
                          compact
                          label="Preset"
                          value={presetKey}
                          onChange={(value) => applyPreset(PRESETS[value])}
                          options={Object.values(PRESETS).map((preset) => ({ value: preset.key, label: preset.label }))}
                        />
                        <SelectField
                          compact
                          label="Mass model"
                          value={massMode}
                          onChange={setMassMode}
                          options={[
                            { value: 'direct', label: 'Direct mass' },
                            { value: 'density', label: 'Density × volume' }
                          ]}
                        />
                      </div>
                      <div className="control-grid compact-grid">
                        <NumericField compact label="Width" value={round(toDisplayLength(widthM, unitSystem), 3)} unit={lengthUnit(unitSystem)} min="1" step="0.1" onChange={(value) => setWidthM(fromDisplayLength(value, unitSystem))} />
                        <NumericField compact label="Length" value={round(toDisplayLength(lengthM, unitSystem), 3)} unit={lengthUnit(unitSystem)} min="1" step="0.1" onChange={(value) => setLengthM(fromDisplayLength(value, unitSystem))} />
                        <NumericField compact label="Thickness" value={round(toDisplayLength(thicknessM, unitSystem), 3)} unit={lengthUnit(unitSystem)} min="0.1" step="0.1" onChange={(value) => setThicknessM(fromDisplayLength(value, unitSystem))} />
                        {massMode === 'direct' ? (
                          <NumericField compact label="Mass" value={round(toDisplayMass(massKg, unitSystem), 3)} unit={massUnit(unitSystem)} min="0.1" step="0.1" onChange={(value) => setMassKg(fromDisplayMass(value, unitSystem))} />
                        ) : (
                          <NumericField compact label="Density" value={round(toDisplayDensity(densityKgM3, unitSystem), 3)} unit={densityUnit(unitSystem)} min="1" step="1" onChange={(value) => setDensityKgM3(fromDisplayDensity(value, unitSystem))} />
                        )}
                      </div>
                    </div>

                    <div className="control-section">
                      <div className="control-section-header">
                        <h3>Motion</h3>
                        <p>Operating tilt target and move timing.</p>
                      </div>
                      <div className="control-grid compact-grid">
                        <NumericField compact label="Max tilt" value={round(targetTiltDeg, 3)} unit="deg" min="0.1" max="12" step="0.1" onChange={setTargetTiltDeg} />
                        <NumericField compact label="Downhill heading" value={round(headingDeg, 3)} unit="deg" min="0" max="360" step="1" onChange={setHeadingDeg} />
                        <NumericField compact label="Time to max tilt" value={round(moveTimeS, 3)} unit="s" min="0.2" step="0.1" onChange={setMoveTimeS} />
                      </div>
                    </div>

                    <div className="control-section">
                      <div className="control-section-header">
                        <h3>Drive</h3>
                        <p>Motor selection and torque margin.</p>
                      </div>
                      <div className="control-grid compact-grid">
                        <SelectField
                          compact
                          label="Motor option"
                          value={motorKey}
                          onChange={setMotorKey}
                          options={MOTOR_OPTION_LIST.map((option) => ({ value: option.key, label: option.label }))}
                        />
                        <NumericField compact label="Safety factor" value={round(safetyFactor, 2)} unit="x" min="1" step="0.1" onChange={setSafetyFactor} />
                      </div>
                      <div className="hint">
                        Current design requires {formatTorque(model.recommendedTorqueNm, unitSystem)} with margin included. The selected motor is {model.selectedMotorCanDrive ? 'inside' : 'outside'} that limit.
                      </div>
                    </div>

                    <div className="control-section">
                      <div className="control-section-header">
                        <h3>Geometry</h3>
                        <p>Motor radius, crank length, rod length, and underside mounting geometry.</p>
                      </div>
                      <div className="control-grid compact-grid">
                        <NumericField compact label="Motor radius" value={round(toDisplayLength(baseRadiusM, unitSystem), 3)} unit={lengthUnit(unitSystem)} min="0.1" step="0.1" onChange={(value) => setBaseRadiusM(fromDisplayLength(value, unitSystem))} />
                        <NumericField compact label="Mounting radius" value={round(toDisplayLength(supportRadiusM, unitSystem), 3)} unit={lengthUnit(unitSystem)} min="0.1" step="0.1" onChange={(value) => setSupportRadiusM(fromDisplayLength(value, unitSystem))} />
                        <NumericField compact label="Crank length" value={round(toDisplayLength(crankRadiusM, unitSystem), 3)} unit={lengthUnit(unitSystem)} min="0.01" step="0.05" onChange={(value) => setCrankRadiusM(fromDisplayLength(value, unitSystem))} />
                        <NumericField compact label="Rod length" value={round(toDisplayLength(rodLengthM, unitSystem), 3)} unit={lengthUnit(unitSystem)} min="0.05" step="0.1" onChange={(value) => setRodLengthM(fromDisplayLength(value, unitSystem))} />
                        <NumericField compact label="Neutral center height" value={round(toDisplayLength(neutralHeightM, unitSystem), 3)} unit={lengthUnit(unitSystem)} min="-10" step="0.1" onChange={(value) => setNeutralHeightM(fromDisplayLength(value, unitSystem))} />
                        <NumericField compact label="Motor shaft height" value={round(toDisplayLength(shaftHeightM, unitSystem), 3)} unit={lengthUnit(unitSystem)} min="-10" step="0.1" onChange={(value) => setShaftHeightM(fromDisplayLength(value, unitSystem))} />
                      </div>
                    </div>
                  </div>
                </div>
              </section>
            </aside>

            <main className="sim-main">
              <section className="sim-panel hero-panel">
                <div className="sim-panel-header">
                  <h2>3D mechanism view</h2>
                  <p>The scene and its motion strip stay fixed while the side rails hold compact controls and segmented detail.</p>
                </div>
                <div className="hero-toolbar">
                  <div className="progress-strip">
                    <div className="progress-caption">Motion progress: 0% is level, 100% is the commanded max tilt.</div>
                    <div className="slider-wrap">
                      <input type="range" min="0" max="1" step="0.01" value={inspectProgress} onChange={(event) => setInspectProgress(Number(event.target.value))} />
                      <div className="slider-value">{round(inspectProgress * 100, 0)}%</div>
                    </div>
                  </div>
                  <div className="hero-toolbar-group">
                    <span className="hero-toolbar-label">Playback</span>
                    <button className={`chip-button ${isPlaying ? 'is-active' : ''}`} onClick={() => setIsPlaying((current) => !current)}>
                      {isPlaying ? 'Pause' : 'Play'}
                    </button>
                    <button className="chip-button" onClick={() => setInspectProgress(0)}>Level</button>
                    <button className="chip-button" onClick={() => setInspectProgress(1)}>Max tilt</button>
                  </div>
                  <div className="hero-toolbar-group">
                    <span className="hero-toolbar-label">Camera</span>
                    <button className={`chip-button ${cameraPreset === 'isometric' ? 'is-active' : ''}`} onClick={() => setCameraPreset('isometric')}>Iso</button>
                    <button className={`chip-button ${cameraPreset === 'downhill' ? 'is-active' : ''}`} onClick={() => setCameraPreset('downhill')}>Downhill</button>
                    <button className={`chip-button ${cameraPreset === 'top' ? 'is-active' : ''}`} onClick={() => setCameraPreset('top')}>Top</button>
                  </div>
                  <div className="hero-toolbar-group">
                    <span className="hero-toolbar-label">Overlays</span>
                    <button className={`chip-button ${showNeutralGhost ? 'is-active' : ''}`} onClick={() => setShowNeutralGhost((current) => !current)}>{showNeutralGhost ? 'Ghost on' : 'Ghost off'}</button>
                    <button className={`chip-button ${showForceArrows ? 'is-active' : ''}`} onClick={() => setShowForceArrows((current) => !current)}>{showForceArrows ? 'Forces on' : 'Forces off'}</button>
                  </div>
                </div>
                <div className="hero-kpi-grid">
                  <MiniStatCard label="Current tilt" value={`${round(currentPoseTiltDeg, 2)}°`} subtext={displaySample ? `t = ${round(displaySample.t, 2)} s` : 'No valid pose'} />
                  <MiniStatCard label="Current peak torque" value={formatTorque(currentPosePeakTorqueNm, model.unitSystem)} tone="info" />
                  <MiniStatCard label="Current peak support" value={formatForce(currentPosePeakSupportN, model.unitSystem)} />
                  <MiniStatCard label="Signed accel" value={displaySample ? `${round(displaySample.alphaRadS2, 3)} rad/s²` : '--'} subtext={displaySample ? (displaySample.alphaRadS2 >= 0 ? 'tilt still increasing' : 'tilt is braking') : ''} tone={displaySample && displaySample.alphaRadS2 < 0 ? 'warn' : ''} />
                </div>
                <div className="hero-scene-shell">
                  <ThreePlatformView
                    model={model}
                    displaySample={displaySample}
                    cameraPreset={cameraPreset}
                    showNeutralGhost={showNeutralGhost}
                    showForceArrows={showForceArrows}
                  />
                </div>
              </section>
            </main>

            <aside className="sim-detail">
              <DetailPane
                model={model}
                displaySample={displaySample}
                detailTab={detailTab}
                setDetailTab={setDetailTab}
                sweepView={sweepView}
                setSweepView={setSweepView}
              />
            </aside>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
