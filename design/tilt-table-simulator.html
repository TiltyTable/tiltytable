<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3-Motor Tilt Table Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/app.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="module">
    window.ThreeTiltSimStatus = 'loading';
    import('https://esm.sh/three@0.160.1')
      .then(async (threeModule) => {
        const controlsModule = await import('https://esm.sh/three@0.160.1/examples/jsm/controls/OrbitControls');
        window.ThreeTiltSim = {
          THREE: threeModule,
          OrbitControls: controlsModule.OrbitControls
        };
        window.ThreeTiltSimError = '';
        window.ThreeTiltSimStatus = 'ready';
      })
      .catch((error) => {
        window.ThreeTiltSimError = String(error);
        window.ThreeTiltSimStatus = 'error';
      });
  </script>
  <style>
    body {
      background:
        radial-gradient(circle at top left, rgba(99, 196, 255, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(156, 222, 116, 0.1), transparent 26%),
        var(--bg);
    }

    .sim-shell {
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sim-header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(32, 38, 49, 0.96), rgba(24, 28, 35, 0.96));
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.24);
    }

    .sim-header h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1.05;
    }

    .sim-header p {
      margin: 0;
      max-width: 72ch;
      color: var(--text-dim);
      line-height: 1.58;
    }

    .sim-summary {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .summary-chip {
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-dim);
      font-size: 12px;
    }

    .sim-grid {
      display: grid;
      grid-template-columns: minmax(320px, 380px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .sim-sidebar,
    .sim-main {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 0;
    }

    .sim-panel {
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(32, 38, 49, 0.92), rgba(24, 28, 35, 0.94));
      box-shadow: 0 18px 54px rgba(0, 0, 0, 0.2);
    }

    .sim-panel-header {
      padding: 15px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .sim-panel-header h2,
    .sim-panel-header h3 {
      margin: 0 0 6px;
      font-size: 15px;
      font-family: 'JetBrains Mono', monospace;
    }

    .sim-panel-header p {
      margin: 0;
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.52;
    }

    .sim-panel-body {
      padding: 18px;
    }

    .chip-row,
    .toggle-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip-button {
      appearance: none;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-dim);
      padding: 8px 12px;
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      transition: border-color 0.16s ease, background 0.16s ease, color 0.16s ease, transform 0.16s ease;
    }

    .chip-button:hover {
      border-color: rgba(255, 179, 90, 0.5);
      color: var(--text);
      transform: translateY(-1px);
    }

    .chip-button.is-active {
      border-color: var(--accent);
      background: rgba(255, 179, 90, 0.14);
      color: var(--text);
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(152px, 1fr));
      gap: 14px 16px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .control-group label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .control-help {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.45;
      text-transform: none;
      letter-spacing: 0;
    }

    .control-input,
    .control-select {
      width: 100%;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      outline: none;
    }

    .control-input:focus,
    .control-select:focus {
      border-color: rgba(255, 179, 90, 0.65);
      box-shadow: 0 0 0 1px rgba(255, 179, 90, 0.3);
    }

    .control-suffix {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.4;
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-wrap input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      outline: none;
    }

    .slider-wrap input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 0;
      background: var(--accent);
    }

    .slider-wrap input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 0;
      background: var(--accent);
    }

    .slider-value {
      min-width: 72px;
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--accent);
    }

    .hint {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.55;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .result-card {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .result-label {
      color: var(--text-dim);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: 'JetBrains Mono', monospace;
    }

    .result-value {
      color: var(--text);
      font-size: 23px;
      font-weight: 700;
      line-height: 1.1;
      word-break: break-word;
    }

    .result-value.good { color: var(--good); }
    .result-value.warn { color: var(--accent); }
    .result-value.danger { color: var(--danger); }
    .result-value.info { color: var(--vertical); }

    .result-note {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.45;
    }

    .visual-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .svg-host {
      padding: 16px;
      background: rgba(16, 19, 24, 0.82);
    }

    .svg-host svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .detail-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .detail-table th,
    .detail-table td {
      padding: 9px 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      text-align: left;
      vertical-align: top;
    }

    .detail-table th {
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }

    .detail-table td:last-child,
    .detail-table th:last-child {
      text-align: right;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .warning-list,
    .validation-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .warning-item,
    .validation-item {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      font-size: 12px;
      line-height: 1.55;
    }

    .warning-item {
      border-color: rgba(255, 111, 97, 0.28);
      color: #ffd5d0;
      background: rgba(255, 111, 97, 0.08);
    }

    .warning-item.warn {
      border-color: rgba(255, 179, 90, 0.28);
      color: #ffe8cc;
      background: rgba(255, 179, 90, 0.08);
    }

    .validation-item {
      color: var(--text-dim);
    }

    .callout {
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-top: 14px;
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.55;
    }

    .chart-stack {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 0 18px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 12px;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }

    .metric-pairs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }

    .metric-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .metric-row span:first-child {
      color: var(--text-dim);
    }

    .metric-row span:last-child {
      text-align: right;
    }

    .footer-note {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.55;
    }

    .scene-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.75fr) minmax(280px, 0.95fr);
      gap: 20px;
      align-items: start;
    }

    .scene-main,
    .scene-side {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 0;
    }

    .scene-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .scene-toolbar-group {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding-right: 12px;
      margin-right: 4px;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
    }

    .scene-toolbar-group:last-child {
      border-right: 0;
      padding-right: 0;
      margin-right: 0;
    }

    .scene-toolbar-label {
      color: var(--text-dim);
      font-size: 12px;
      margin-right: 4px;
    }

    .three-wrap {
      position: relative;
      background:
        radial-gradient(circle at top, rgba(99, 196, 255, 0.12), transparent 34%),
        rgba(16, 19, 24, 0.9);
      min-height: 520px;
    }

    .three-canvas-host {
      width: 100%;
      height: 520px;
      cursor: grab;
    }

    .three-canvas-host:active {
      cursor: grabbing;
    }

    .three-overlay {
      position: absolute;
      left: 18px;
      top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .scene-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      max-width: min(100%, 340px);
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      background: rgba(16, 19, 24, 0.78);
      backdrop-filter: blur(12px);
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.35;
    }

    .three-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 520px;
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
      padding: 18px;
    }

    .scene-legend-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .scene-legend-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.5;
    }

    .scene-legend-item strong {
      color: var(--text);
    }

    .scene-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-top: 3px;
      flex: 0 0 auto;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.14);
    }

    .scene-note-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .scene-note-item {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.55;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }

    .scene-note-item strong {
      color: var(--text);
    }

    .pose-leg-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .pose-leg-card {
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pose-leg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .pose-leg-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }

    .pose-leg-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 7px;
      border-radius: 999px;
      color: #081018;
      font-size: 11px;
      font-weight: 700;
    }

    .pose-leg-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 12px;
    }

    .pose-leg-meta-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .pose-leg-meta-row span:first-child {
      color: var(--text-dim);
    }

    .leg-row-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .leg-row-label span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12);
    }

    html, body, #root {
      height: 100%;
      overflow: hidden;
    }

    body {
      overflow: hidden;
    }

    .sim-shell {
      height: 100dvh;
      padding: 14px;
      gap: 14px;
      overflow: hidden;
    }

    .sim-header {
      flex: 0 0 auto;
      padding: 14px 16px;
      align-items: center;
    }

    .sim-header h1 {
      margin: 0;
      font-size: clamp(22px, 2vw, 30px);
    }

    .sim-header p {
      max-width: 56ch;
      font-size: 12px;
      line-height: 1.45;
    }

    .header-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sim-summary {
      margin-top: 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      min-width: 0;
    }

    .summary-chip {
      min-width: 0;
      padding: 8px 10px;
      font-size: 11px;
      line-height: 1.35;
    }

    .summary-chip strong {
      display: block;
      color: var(--text);
      font-size: 12px;
      margin-bottom: 2px;
    }

    .sim-grid {
      flex: 1;
      min-height: 0;
      grid-template-columns: minmax(300px, 320px) minmax(0, 1fr) minmax(320px, 360px);
      gap: 14px;
      align-items: stretch;
    }

    .sim-sidebar,
    .sim-main,
    .sim-detail {
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sim-panel {
      min-height: 0;
    }

    .sim-panel-header {
      padding: 12px 14px;
    }

    .sim-panel-header h2,
    .sim-panel-header h3 {
      font-size: 14px;
      margin: 0 0 4px;
    }

    .sim-panel-header p {
      font-size: 12px;
      line-height: 1.45;
    }

    .sim-panel-body {
      padding: 12px;
    }

    .control-panel,
    .detail-panel,
    .hero-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .control-panel .sim-panel-body,
    .detail-panel .sim-panel-body {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-sections {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-section {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-section-header {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .control-section-header h3 {
      margin: 0;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

    .control-section-header p {
      display: none;
      margin: 0;
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.4;
    }

    .control-grid.compact-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .control-group.compact {
      gap: 4px;
    }

    .control-group.compact label {
      font-size: 10px;
      letter-spacing: 0.04em;
    }

    .control-group.compact .control-input,
    .control-group.compact .control-select {
      padding: 8px 9px;
      border-radius: 10px;
      font-size: 13px;
    }

    .control-group.compact .control-suffix,
    .control-group.compact .control-help {
      font-size: 11px;
      line-height: 1.35;
    }

    .control-inline {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .control-inline > * {
      flex: 1;
      min-width: 0;
    }

    .compact-callout {
      margin-top: 0;
      padding-top: 8px;
      font-size: 11px;
      line-height: 1.45;
    }

    .hero-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .hero-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
    }

    .hero-toolbar-group {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .hero-toolbar-label {
      color: var(--text-dim);
      font-size: 11px;
      white-space: nowrap;
    }

    .progress-strip {
      flex: 1 1 260px;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .progress-strip .slider-wrap {
      gap: 8px;
    }

    .progress-caption {
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.35;
    }

    .hero-kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.02);
    }

    .mini-stat-card {
      min-width: 0;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
      padding: 9px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .mini-stat-label {
      color: var(--text-dim);
      font-size: 10px;

    const IN_TO_M = 0.0254;
    const LB_TO_KG = 0.45359237;
    const LBFT3_TO_KGM3 = 16.01846337;
    const RAD_TO_DEG = 180 / Math.PI;
    const DEG_TO_RAD = Math.PI / 180;
    const LEG_AZIMUTHS = [0, 120, 240].map((deg) => deg * DEG_TO_RAD);
    const LEG_META = [
      { name: 'Leg 1', color: 0x63c4ff, css: '#63c4ff', badgeText: 'L1' },

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function round(value, digits = 2) {
      const factor = 10 ** digits;
      return Math.round(value * factor) / factor;
    }

    function toRadians(deg) {
      return deg * DEG_TO_RAD;
    }

    function toDegrees(rad) {
      return rad * RAD_TO_DEG;
    }

    function toDisplayLength(meters, unitSystem) {
      return unitSystem === 'imperial' ? meters / IN_TO_M : meters * 1000;
    }

    function fromDisplayLength(value, unitSystem) {
      return unitSystem === 'imperial' ? value * IN_TO_M : value / 1000;
    }

    function lengthUnit(unitSystem) {
      return unitSystem === 'imperial' ? 'in' : 'mm';
    }

    function densityUnit(unitSystem) {
      return unitSystem === 'imperial' ? 'lb/ft^3' : 'kg/m^3';
    }

    function toDisplayMass(kg, unitSystem) {
      return unitSystem === 'imperial' ? kg / LB_TO_KG : kg;
    }

    function fromDisplayMass(value, unitSystem) {
      return unitSystem === 'imperial' ? value * LB_TO_KG : value;
    }

    function massUnit(unitSystem) {
      return unitSystem === 'imperial' ? 'lb' : 'kg';
    }

    function toDisplayDensity(value, unitSystem) {
      return unitSystem === 'imperial' ? value / LBFT3_TO_KGM3 : value;
    }

    function fromDisplayDensity(value, unitSystem) {
      return unitSystem === 'imperial' ? value * LBFT3_TO_KGM3 : value;
    }

    function toDisplayForce(newtons, unitSystem) {
      return unitSystem === 'imperial' ? newtons / G / LB_TO_KG : newtons;
    }

    function forceUnit(unitSystem) {
      return unitSystem === 'imperial' ? 'lbf' : 'N';
    }

    function toDisplayTorque(nm, unitSystem) {
      return unitSystem === 'imperial' ? nm * 8.85074579 : nm;
    }

    function torqueUnit(unitSystem) {
      return unitSystem === 'imperial' ? 'lbf·in' : 'N·m';
    }

    function motorUsageTone(usageRatio) {
      if (!Number.isFinite(usageRatio)) {
        return 'danger';
      }
      if (usageRatio <= 0.75) {
        return 'good';
      }
      if (usageRatio <= 1) {
        return 'warn';
      }
      return 'danger';
    }

    function requiredMotorTorque(peakTorqueNm, safetyFactor) {
      return Number.isFinite(peakTorqueNm) ? peakTorqueNm * safetyFactor : NaN;
    }

    function sweepPointFitsMotor(entry, motorTorqueNm) {
      return Boolean(entry?.feasible) && Number.isFinite(entry.requiredMotorTorqueNm) && entry.requiredMotorTorqueNm <= motorTorqueNm + 1e-9;
    }

    function smallestViableMotor(requiredTorqueNm) {
      return MOTOR_OPTION_LIST.find((option) => option.torqueNm + 1e-9 >= requiredTorqueNm) ?? null;
    }

    function chooseNearMinimum(entries, valueAccessor, distanceAccessor = () => 0, toleranceRatio = 1.08) {
      const valid = entries.filter((entry) => Number.isFinite(valueAccessor(entry)));
      if (!valid.length) {
        return null;
      }
      const bestValue = Math.min(...valid.map(valueAccessor));
      const limit = bestValue <= 1e-9 ? bestValue + 1e-9 : bestValue * toleranceRatio;
      return [...valid]
        .filter((entry) => valueAccessor(entry) <= limit)
        .sort((a, b) => distanceAccessor(a) - distanceAccessor(b) || valueAccessor(a) - valueAccessor(b))[0];
    }

    function sweepBounds(currentValue, { minValue, maxValue, lowFactor, highFactor, minSpan }) {
      const boundedMax = Math.max(maxValue, minValue);
      const low = Math.min(boundedMax, Math.max(minValue, currentValue * lowFactor));
      let high = Math.min(boundedMax, Math.max(currentValue * highFactor, low + minSpan));
      if (high <= low) {
        high = Math.min(boundedMax, low + minSpan);
      }
      if (high < low) {
        high = low;
      }
      return { low, high };
    }

    function signed(value, digits = 1) {
      return `${value >= 0 ? '+' : ''}${round(value, digits)}`;
    }

    function nearestAngle(candidate, reference) {
      if (reference == null) {
        return candidate;
      }
      const twoPi = Math.PI * 2;
      let best = candidate;
      let bestDiff = Math.abs(candidate - reference);
      for (let k = -2; k <= 2; k += 1) {
        const shifted = candidate + k * twoPi;
        const diff = Math.abs(shifted - reference);
        if (diff < bestDiff) {
          bestDiff = diff;
          best = shifted;
        }
      }
      return best;
    }

    function solve3x3(matrix, vector) {
      const a = matrix.map((row, rowIndex) => [...row, vector[rowIndex]]);
      for (let pivot = 0; pivot < 3; pivot += 1) {
        let bestRow = pivot;
        for (let row = pivot + 1; row < 3; row += 1) {
          if (Math.abs(a[row][pivot]) > Math.abs(a[bestRow][pivot])) {
            bestRow = row;
          }
        }
        if (Math.abs(a[bestRow][pivot]) < 1e-12) {
          return null;
        }
        if (bestRow !== pivot) {
          const temp = a[pivot];
          a[pivot] = a[bestRow];
          a[bestRow] = temp;
        }
        const divisor = a[pivot][pivot];
        for (let col = pivot; col < 4; col += 1) {
          a[pivot][col] /= divisor;
        }
        for (let row = 0; row < 3; row += 1) {
          if (row === pivot) continue;
          const factor = a[row][pivot];
          for (let col = pivot; col < 4; col += 1) {
            a[row][col] -= factor * a[pivot][col];
          }
        }
      }
      return [a[0][3], a[1][3], a[2][3]];
    }

    function supportPositions(radius) {
      return LEG_AZIMUTHS.map((phi, index) => ({
        index,
        phi,
        x: radius * Math.cos(phi),
        y: radius * Math.sin(phi)
      }));
    }

    function motorPositions(radius) {
      return supportPositions(radius);
    }

    function addVec3(a, b) {
      return { x: a.x + b.x, y: a.y + b.y, z: a.z + b.z };
    }

    function subVec3(a, b) {
      return { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
    }

    function scaleVec3(vector, scalar) {
      return { x: vector.x * scalar, y: vector.y * scalar, z: vector.z * scalar };
    }

    function dotVec3(a, b) {
      return a.x * b.x + a.y * b.y + a.z * b.z;
    }

    function crossVec3(a, b) {
      return {
        x: a.y * b.z - a.z * b.y,
        y: a.z * b.x - a.x * b.z,
        z: a.x * b.y - a.y * b.x
      };
    }

    function lengthVec3(vector) {
      return Math.hypot(vector.x, vector.y, vector.z);
    }

    function normalizeVec3(vector) {
      const magnitude = lengthVec3(vector);
      if (magnitude < 1e-9) {
        return { x: 0, y: 0, z: 0 };
      }
      return scaleVec3(vector, 1 / magnitude);
    }

    function rotateAroundAxis(vector, axis, angleRad) {
      const unitAxis = normalizeVec3(axis);
      const cosTheta = Math.cos(angleRad);
      const sinTheta = Math.sin(angleRad);
      const parallel = scaleVec3(unitAxis, dotVec3(unitAxis, vector));
      const perpendicular = subVec3(vector, parallel);
      const cross = crossVec3(unitAxis, vector);
      return addVec3(
        addVec3(scaleVec3(perpendicular, cosTheta), scaleVec3(cross, sinTheta)),
        parallel
      );
    }

    function tiltAxisFromHeading(headingRad) {
      return {
        x: -Math.sin(headingRad),
        y: Math.cos(headingRad),
        z: 0
      };
    }

    function supportPlaneCenterHeight(config) {
      return config.neutralHeightM - config.thicknessM / 2;
    }

    function buildPoseGeometry(config, thetaRad, headingRad) {
      const axis = tiltAxisFromHeading(headingRad);
      const supportCenterPoint = {
        x: 0,
        y: 0,
        z: supportPlaneCenterHeight(config)
      };
      const supportPoints = supportPositions(config.supportRadiusM).map((point) => {
        const rotated = rotateAroundAxis({ x: point.x, y: point.y, z: 0 }, axis, thetaRad);
        return {
          ...point,
          x: supportCenterPoint.x + rotated.x,
          y: supportCenterPoint.y + rotated.y,
          z: supportCenterPoint.z + rotated.z,
          neutralX: point.x,
          neutralY: point.y
        };
      });
      const comOffset = rotateAroundAxis({ x: 0, y: 0, z: config.thicknessM / 2 }, axis, thetaRad);
      const comPoint = addVec3(supportCenterPoint, comOffset);
      const normal = rotateAroundAxis({ x: 0, y: 0, z: 1 }, axis, thetaRad);
      return {
        axis,
        supportCenterPoint,
        supportPoints,
        comPoint,
        normal
      };
    }

    function crankPointAtBeta(basePoint, phi, crankRadius, beta) {
      return {
        x: basePoint.x + Math.cos(phi) * crankRadius * Math.cos(beta),
        y: basePoint.y + Math.sin(phi) * crankRadius * Math.cos(beta),
        z: basePoint.z + crankRadius * Math.sin(beta)
      };
    }

    function legKinematicsAtBeta(basePoint, supportPoint, phi, crankRadius, rodLength, beta) {
      const crankPoint = crankPointAtBeta(basePoint, phi, crankRadius, beta);
      const rodVector = subVec3(supportPoint, crankPoint);
      const rodDistance = lengthVec3(rodVector);
      const radialDirection = { x: Math.cos(phi), y: Math.sin(phi), z: 0 };
      const tangentialDirection = { x: -Math.sin(phi), y: Math.cos(phi), z: 0 };
      const crankVelocity = {
        x: -radialDirection.x * crankRadius * Math.sin(beta),
        y: -radialDirection.y * crankRadius * Math.sin(beta),
        z: crankRadius * Math.cos(beta)
      };
      const horizontalDistance = Math.hypot(rodVector.x, rodVector.y);
      const dfdBeta = -2 * dotVec3(rodVector, crankVelocity);
      const dzdBeta = Math.abs(rodVector.z) > 1e-9 ? dotVec3(rodVector, crankVelocity) / rodVector.z : NaN;
      return {
        beta,
        crankX: crankRadius * Math.cos(beta),
        crankZ: crankRadius * Math.sin(beta),
        crankPoint,
        rodVector,
        rodX: dotVec3(rodVector, radialDirection),
        rodY: dotVec3(rodVector, tangentialDirection),
        rodZ: rodVector.z,
        rodDistance,
        rodAngleDeg: rodDistance > 1e-9 ? toDegrees(Math.acos(clamp(rodVector.z / rodDistance, -1, 1))) : 0,
        horizontalDistance,
        f: rodDistance ** 2 - rodLength ** 2,
        dfdBeta,
        dzdBeta,
        supportPoint,
        basePoint,
        localDx: dotVec3(subVec3(supportPoint, basePoint), radialDirection)
      };
    }

    function solveLegWithGuess(basePoint, supportPoint, phi, crankRadius, rodLength, initialGuess) {
      let beta = initialGuess;
      for (let iteration = 0; iteration < 18; iteration += 1) {
        const state = legKinematicsAtBeta(basePoint, supportPoint, phi, crankRadius, rodLength, beta);
        if (Math.abs(state.f) < 1e-10) {
          if (state.rodZ > 1e-6 && Number.isFinite(state.dzdBeta)) {
            return state;
          }
          break;
        }
        if (!Number.isFinite(state.dfdBeta) || Math.abs(state.dfdBeta) < 1e-10) {
          break;
        }
        beta -= state.f / state.dfdBeta;
      }
      const finalState = legKinematicsAtBeta(basePoint, supportPoint, phi, crankRadius, rodLength, beta);
      if (Math.abs(finalState.f) < 1e-8 && finalState.rodZ > 1e-6 && Number.isFinite(finalState.dzdBeta)) {
        return finalState;
      }
      return null;
    }

    function bisectionLegRoot(basePoint, supportPoint, phi, crankRadius, rodLength, leftBeta, rightBeta, leftF, rightF) {
      let left = leftBeta;
      let right = rightBeta;
      let fLeft = leftF;
      let fRight = rightF;
      for (let iteration = 0; iteration < 40; iteration += 1) {
        const mid = (left + right) / 2;
        const state = legKinematicsAtBeta(basePoint, supportPoint, phi, crankRadius, rodLength, mid);
        if (Math.abs(state.f) < 1e-10) {
          return state;
        }
        if (fLeft === 0 || fLeft * state.f <= 0) {
          right = mid;
          fRight = state.f;
        } else {
          left = mid;
          fLeft = state.f;
        }
      }
      const mid = (left + right) / 2;
      return legKinematicsAtBeta(basePoint, supportPoint, phi, crankRadius, rodLength, mid);
    }

    function legCrankSolutions(basePoint, supportPoint, phi, crankRadius, rodLength, previousBeta = null) {
      const attempted = new Map();
      const pushSolution = (solution, results) => {
        if (!solution || Math.abs(solution.f) > 1e-7 || solution.rodZ <= 1e-6 || !Number.isFinite(solution.dzdBeta)) {
          return;
        }
        const key = round(nearestAngle(solution.beta, 0), 6);
        if (!attempted.has(key)) {
          attempted.set(key, true);
          results.push(solution);
        }
      };

      const results = [];
      if (previousBeta != null) {
        [previousBeta, previousBeta + 0.16, previousBeta - 0.16].forEach((guess) => {
          pushSolution(solveLegWithGuess(basePoint, supportPoint, phi, crankRadius, rodLength, guess), results);
        });
        if (results.length) {
          return results;
        }
      }

      const sampleCount = 144;
      let previousState = legKinematicsAtBeta(basePoint, supportPoint, phi, crankRadius, rodLength, -Math.PI);
      if (Math.abs(previousState.f) < 1e-10) {
        pushSolution(previousState, results);
      }

      for (let index = 1; index <= sampleCount; index += 1) {
        const beta = -Math.PI + (index / sampleCount) * Math.PI * 2;
        const state = legKinematicsAtBeta(basePoint, supportPoint, phi, crankRadius, rodLength, beta);
        if (Math.abs(state.f) < 1e-10) {
          pushSolution(state, results);
        } else if (previousState.f * state.f < 0) {
          pushSolution(
            bisectionLegRoot(basePoint, supportPoint, phi, crankRadius, rodLength, beta - (Math.PI * 2) / sampleCount, beta, previousState.f, state.f),
            results
          );
        }
        previousState = state;
      }

      return results;
    }

    function chooseLegSolution(solutions, previousBeta) {
      if (!solutions.length) {
        return null;
      }
      if (previousBeta != null) {
        return solutions
          .map((solution) => ({
            ...solution,
            beta: nearestAngle(solution.beta, previousBeta)
          }))
          .sort((a, b) => Math.abs(a.beta - previousBeta) - Math.abs(b.beta - previousBeta))[0];
      }
      return [...solutions].sort((a, b) => {
        if (Math.abs(a.rodAngleDeg - b.rodAngleDeg) > 1e-6) {
          return a.rodAngleDeg - b.rodAngleDeg;
        }
        return Math.abs(b.rodZ) - Math.abs(a.rodZ);
      })[0];
    }

    function solvePose(config, thetaRad, headingRad, previousBetas = []) {
      const geometry = buildPoseGeometry(config, thetaRad, headingRad);
      const topPoints = geometry.supportPoints;
      const legs = [];
      for (let index = 0; index < topPoints.length; index += 1) {
        const topPoint = topPoints[index];
        const basePoint = {
          x: config.baseRadiusM * Math.cos(topPoint.phi),
          y: config.baseRadiusM * Math.sin(topPoint.phi),
          z: config.shaftHeightM
        };
        const solutions = legCrankSolutions(basePoint, topPoint, topPoint.phi, config.crankRadiusM, config.rodLengthM, previousBetas[index] ?? null);
        const leg = chooseLegSolution(solutions, previousBetas[index] ?? null);
        if (!leg) {
          return {
            valid: false,
            topPoints,
            reason: `Leg ${index + 1} cannot reach the required support height.`
          };
        }
        legs.push({
          ...leg,
          topZ: topPoint.z,
          shaftZ: config.shaftHeightM,
          topPoint,
          basePoint
        });
      }
      return {
        valid: true,
        thetaRad,
        headingRad,
        topPoints,
        supportPoints: topPoints,
        supportCenterPoint: geometry.supportCenterPoint,
        comPoint: geometry.comPoint,
        normal: geometry.normal,
        legs
      };
    }

    function motionStateAtProgress(progress, moveTimeS, targetTiltRad) {
      const t = clamp(progress, 0, 1) * moveTimeS;
      const half = moveTimeS / 2;
      const accel = moveTimeS > 0 ? (4 * targetTiltRad) / (moveTimeS ** 2) : 0;
      if (t <= half) {
        return {
          t,
          thetaRad: 0.5 * accel * t ** 2,
          alphaRadS2: accel
        };
      }
      const dt = moveTimeS - t;
      return {
        t,
        thetaRad: targetTiltRad - 0.5 * accel * dt ** 2,
        alphaRadS2: -accel
      };
    }

    function inertiaRectPrism(massKg, widthM, lengthM, thicknessM) {
      return {
        Ixx: (massKg * (lengthM ** 2 + thicknessM ** 2)) / 12,
        Iyy: (massKg * (widthM ** 2 + thicknessM ** 2)) / 12,
        Izz: (massKg * (widthM ** 2 + lengthM ** 2)) / 12
      };
    }

    function supportForcesForMoment(points, comPoint, weightN, momentX, momentY) {
      const matrix = [
        [1, 1, 1],
        points.map((point) => point.y - comPoint.y),
        points.map((point) => -(point.x - comPoint.x))
      ];
      const vector = [weightN, momentX, momentY];
      const solved = solve3x3(matrix, vector);
      return solved;
    }

    function edgeClearance(points, widthM, lengthM) {
      return Math.min(...points.map((point) => Math.min(widthM / 2 - Math.abs(point.x), lengthM / 2 - Math.abs(point.y))));
    }

    function supportHeightBoundsAtXY(basePoint, supportXY, phi, crankRadius, rodLength) {
      let minZ = Number.POSITIVE_INFINITY;
      let maxZ = Number.NEGATIVE_INFINITY;
      for (let step = 0; step <= 720; step += 1) {
        const beta = -Math.PI + (step / 720) * Math.PI * 2;
        const crankPoint = crankPointAtBeta(basePoint, phi, crankRadius, beta);
        const horizontalDistance = Math.hypot(supportXY.x - crankPoint.x, supportXY.y - crankPoint.y);
        const verticalReachSquared = rodLength ** 2 - horizontalDistance ** 2;
        if (verticalReachSquared < 0) {
          continue;
        }
        const supportZ = crankPoint.z + Math.sqrt(verticalReachSquared);
        minZ = Math.min(minZ, supportZ);
        maxZ = Math.max(maxZ, supportZ);
      }
      if (!Number.isFinite(minZ) || !Number.isFinite(maxZ)) {
        return null;
      }
      return { minZ, maxZ };
    }

    function isTrajectoryReachable(config, thetaRad, headingRad) {
      let previousBetas = [];
      const samples = 30;
      for (let index = 0; index <= samples; index += 1) {
        const progress = index / samples;
        const pose = solvePose(config, thetaRad * progress, headingRad, previousBetas);
        if (!pose.valid) {
          return false;
        }
        previousBetas = pose.legs.map((leg) => leg.beta);
      }
      return true;
    }

    function findReachableTilt(config, headingRad, upperLimitDeg = 35) {
      let low = 0;
      let high = toRadians(upperLimitDeg);
      if (!isTrajectoryReachable(config, low, headingRad)) {
        return 0;
      }
      if (isTrajectoryReachable(config, high, headingRad)) {
        return high;
      }
      for (let iteration = 0; iteration < 26; iteration += 1) {
        const mid = (low + high) / 2;
        if (isTrajectoryReachable(config, mid, headingRad)) {
          low = mid;
        } else {
          high = mid;
        }
      }
      return low;
    }

    function findMinimumCrankRadius(config, headingRad, targetTiltRad) {
      const lower = Math.max(0.0025, config.crankRadiusM * 0.2);
      let high = Math.max(config.crankRadiusM, 0.004);
      let configAtHigh = { ...config, crankRadiusM: high };
      let reachable = isTrajectoryReachable(configAtHigh, targetTiltRad, headingRad);
      let guard = 0;
      while (!reachable && high < 0.3 && guard < 18) {
        high *= 1.35;
        configAtHigh = { ...config, crankRadiusM: high };
        reachable = isTrajectoryReachable(configAtHigh, targetTiltRad, headingRad);
        guard += 1;
      }
      if (!reachable) {
        return null;
      }
      let low = lower;
      let best = high;
      for (let iteration = 0; iteration < 24; iteration += 1) {
        const mid = (low + high) / 2;
        const trial = { ...config, crankRadiusM: mid };
        if (isTrajectoryReachable(trial, targetTiltRad, headingRad)) {
          best = mid;
          high = mid;
        } else {
          low = mid;
        }
      }
      return best;
    }

    function evaluateModel(config) {
      const massKg = config.massMode === 'density'
        ? config.densityKgM3 * config.widthM * config.lengthM * config.thicknessM
        : config.massKg;
      const weightN = massKg * G;
      const inertia = inertiaRectPrism(massKg, config.widthM, config.lengthM, config.thicknessM);
      const targetTiltRad = toRadians(config.targetTiltDeg);
      const headingRad = toRadians(config.headingDeg);
      const selectedMotor = MOTOR_OPTIONS[config.motorKey] ?? MOTOR_OPTION_LIST[0];
      const targetGeometry = buildPoseGeometry(config, targetTiltRad, headingRad);
      const supportPlaneCenterHeightM = supportPlaneCenterHeight(config);
      const requiredSupportStrokeM = Math.max(...targetGeometry.supportPoints.map((point) => Math.abs(point.z - supportPlaneCenterHeightM)));
      const tanApproxStrokeM = config.supportRadiusM * Math.tan(targetTiltRad);
      const sinApproxStrokeM = config.supportRadiusM * Math.sin(targetTiltRad);
      const supportPoints = supportPositions(config.supportRadiusM);
      const basePoints = motorPositions(config.baseRadiusM);
      const neutralSupportPoint = supportPoints[0];
      const neutralBasePoint = {
        x: basePoints[0].x,
        y: basePoints[0].y,
        z: config.shaftHeightM
      };
      const strokeBounds = supportHeightBoundsAtXY(
        neutralBasePoint,
        { x: neutralSupportPoint.x, y: neutralSupportPoint.y },
        neutralSupportPoint.phi,
        config.crankRadiusM,
        config.rodLengthM
      );
      const motorClearance = edgeClearance(basePoints, config.widthM, config.lengthM);
      const supportClearance = edgeClearance(supportPoints, config.widthM, config.lengthM);

      const sampleCount = 60;
      const samples = [];
      let previousBetas = [];
      let trajectoryValid = true;
      let trajectoryError = null;
      let peakDynamicTorque = 0;
      let peakDynamicSupportForce = 0;
      let peakDynamicAxialForce = 0;
      let minTravelPerRad = Number.POSITIVE_INFINITY;
      let maxRodAngleDeg = 0;
      const legPeakTorque = [0, 0, 0];
      const legPeakForce = [0, 0, 0];
      let neutralPose = null;
      let finalPose = null;
      let lowestForce = Number.POSITIVE_INFINITY;
      let highestForce = Number.NEGATIVE_INFINITY;
      let headingAxis = {
        x: -Math.sin(headingRad),
        y: Math.cos(headingRad)
      };
      const alphaMagnitude = config.moveTimeS > 0 ? (4 * targetTiltRad) / (config.moveTimeS ** 2) : 0;

      for (let index = 0; index <= sampleCount; index += 1) {
        const progress = index / sampleCount;
        const motion = motionStateAtProgress(progress, config.moveTimeS, targetTiltRad);
        const pose = solvePose(config, motion.thetaRad, headingRad, previousBetas);
        if (!pose.valid) {
          trajectoryValid = false;
          trajectoryError = pose.reason;
          break;
        }
        previousBetas = pose.legs.map((leg) => leg.beta);
        if (!neutralPose) {
          neutralPose = pose;
        }
        finalPose = pose;

        const alphaX = headingAxis.x * motion.alphaRadS2;
        const alphaY = headingAxis.y * motion.alphaRadS2;
        const momentX = inertia.Ixx * alphaX;
        const momentY = inertia.Iyy * alphaY;
        const supportLoads = supportForcesForMoment(pose.topPoints, pose.comPoint, weightN, momentX, momentY);
        if (!supportLoads) {
          trajectoryValid = false;
          trajectoryError = 'Could not solve support reactions for the requested motion.';
          break;
        }

        const legData = pose.legs.map((leg, legIndex) => {
          const supportForceN = supportLoads[legIndex];
          const travelPerRad = Math.abs(leg.dzdBeta);
          const torqueNm = Math.abs(supportForceN * leg.dzdBeta);
          const rodCos = leg.rodDistance > 0 ? clamp(leg.rodZ / leg.rodDistance, 1e-5, 1) : 1e-5;
          const axialForceN = Math.abs(supportForceN / rodCos);
          legPeakTorque[legIndex] = Math.max(legPeakTorque[legIndex], torqueNm);
          legPeakForce[legIndex] = Math.max(legPeakForce[legIndex], Math.abs(supportForceN));
          peakDynamicTorque = Math.max(peakDynamicTorque, torqueNm);
          peakDynamicSupportForce = Math.max(peakDynamicSupportForce, Math.abs(supportForceN));
          peakDynamicAxialForce = Math.max(peakDynamicAxialForce, axialForceN);
          minTravelPerRad = Math.min(minTravelPerRad, travelPerRad);
          maxRodAngleDeg = Math.max(maxRodAngleDeg, leg.rodAngleDeg);
          lowestForce = Math.min(lowestForce, supportForceN);
          highestForce = Math.max(highestForce, supportForceN);
          return {
            ...leg,
            supportForceN,
            torqueNm,
            axialForceN,
            travelPerRad
          };
        });

        samples.push({
          progress,
          ...motion,
          pose,
          legs: legData,
          supportLoads
        });
      }

      const actualReachableTiltRad = findReachableTilt(config, headingRad);
      const minimumCrankRadiusM = findMinimumCrankRadius(config, headingRad, targetTiltRad);
      const neutralStaticLoads = trajectoryValid && neutralPose
        ? supportForcesForMoment(neutralPose.topPoints, neutralPose.comPoint, weightN, 0, 0)
        : null;
      const staticSupportForceN = neutralStaticLoads ? neutralStaticLoads[0] : weightN / 3;
      let staticHoldTorqueNm = 0;
      let staticHoldAxialForceN = 0;
      let staticLegRows = [];

      if (trajectoryValid && finalPose) {
        const finalStaticLoads = supportForcesForMoment(finalPose.topPoints, finalPose.comPoint, weightN, 0, 0) ?? [weightN / 3, weightN / 3, weightN / 3];
        staticLegRows = finalPose.legs.map((leg, legIndex) => {
          const supportForceN = finalStaticLoads[legIndex];
          const torqueNm = Math.abs(supportForceN * leg.dzdBeta);
          const rodCos = leg.rodDistance > 0 ? clamp(leg.rodZ / leg.rodDistance, 1e-5, 1) : 1e-5;
          const axialForceN = Math.abs(supportForceN / rodCos);
          staticHoldTorqueNm = Math.max(staticHoldTorqueNm, torqueNm);
          staticHoldAxialForceN = Math.max(staticHoldAxialForceN, axialForceN);
          return {
            legIndex,
            heightM: leg.topZ,
            crankDeg: toDegrees(leg.beta),
            rodAngleDeg: leg.rodAngleDeg,
            supportForceN,
            torqueNm,
            axialForceN
          };
        });
      }

      const dynamicSizingTorqueNm = Math.max(staticHoldTorqueNm, peakDynamicTorque);
      const recommendedTorqueNm = dynamicSizingTorqueNm * config.safetyFactor;
      const selectedMotorUsageRatio = recommendedTorqueNm / selectedMotor.torqueNm;
      const selectedMotorCanDrive = selectedMotorUsageRatio <= 1 + 1e-9;
      const recommendedMotorOption = smallestViableMotor(recommendedTorqueNm);
      const motorOptionRows = MOTOR_OPTION_LIST.map((option) => {
        const usageRatio = recommendedTorqueNm / option.torqueNm;
        return {
          ...option,
          usageRatio,
          headroomRatio: option.torqueNm / Math.max(recommendedTorqueNm, 1e-9),
          fits: usageRatio <= 1 + 1e-9,
          tone: motorUsageTone(usageRatio)
        };
      });
      const centeredLoadError = neutralStaticLoads
        ? Math.max(...neutralStaticLoads.map((load) => Math.abs(load - weightN / 3)))
        : Math.abs(staticSupportForceN - weightN / 3);
      const strokeCheckError = Math.abs(tanApproxStrokeM - requiredSupportStrokeM);

      const warnings = [];
      if (!trajectoryValid) {
        warnings.push({
          kind: 'danger',
          text: trajectoryError || 'The current geometry cannot trace the requested tilt path.'
        });
      }
      if (toDegrees(actualReachableTiltRad) + 1e-6 < config.targetTiltDeg) {
        warnings.push({
          kind: 'warn',
          text: `Chosen geometry reaches only ${round(toDegrees(actualReachableTiltRad), 2)}° before a leg runs out of stroke or linkage reach.`
        });
      }
      if (strokeBounds) {
        const neutralZ = supportPlaneCenterHeightM;
        const marginDown = neutralZ - strokeBounds.minZ;
        const marginUp = strokeBounds.maxZ - neutralZ;
        if (marginDown < requiredSupportStrokeM * 0.9) {
          warnings.push({
            kind: 'warn',
            text: `Neutral underside height is low for the requested tilt. Available downstroke at the rod mount is ${round(toDisplayLength(marginDown, config.unitSystem), 2)} ${lengthUnit(config.unitSystem)}.`
          });
        }
        if (marginUp < requiredSupportStrokeM * 0.55) {
          warnings.push({
            kind: 'warn',
            text: `Upstroke margin is tight at the bottom-plane support joint. Available upstroke is ${round(toDisplayLength(marginUp, config.unitSystem), 2)} ${lengthUnit(config.unitSystem)}.`
          });
        }
      }
      if (config.rodLengthM / Math.max(config.crankRadiusM, 1e-6) < 4) {
        warnings.push({
          kind: 'warn',
          text: 'Rod length is less than 4x crank length. Expect higher rod angle, more side load, and less linear motion.'
        });
      }
      if (maxRodAngleDeg > 32) {
        warnings.push({
          kind: 'warn',
          text: `Rod articulation peaks at ${round(maxRodAngleDeg, 1)}°. That is workable, but it is getting steep for a clean crank-and-rod layout.`
        });
      }
      if (minTravelPerRad < config.crankRadiusM * 0.12) {
        warnings.push({
          kind: 'warn',
          text: 'One or more legs are near a crank singularity. Travel per motor degree collapses and control sensitivity becomes poor.'
        });
      }
      if (supportClearance < 0) {
        warnings.push({
          kind: 'danger',
          text: 'At least one support point lies outside the table footprint. Reduce mounting radius or increase the table footprint.'
        });
      }
      if (motorClearance < 0) {
        warnings.push({
          kind: 'danger',
          text: 'At least one motor shaft center lies outside the table footprint. Reduce motor radius or place the actuators outside the table envelope on purpose.'
        });
      }
      if (lowestForce < -1e-6) {
        warnings.push({
          kind: 'warn',
          text: 'The dynamic load case briefly unloads one leg below zero support force. That implies lift-off unless the linkage can pull as well as push.'
        });
      }

      const validations = [
        {
          label: 'Support stroke check',
          value: `${round(toDisplayLength(requiredSupportStrokeM, config.unitSystem), 3)} ${lengthUnit(config.unitSystem)}`,
          note: `Exact body-mounted underside stroke is ${round(toDisplayLength(sinApproxStrokeM, config.unitSystem), 3)} ${lengthUnit(config.unitSystem)} from mountingRadius × sin(tilt). The old plane-at-fixed-XY estimate mountingRadius × tan(tilt) is ${round(toDisplayLength(tanApproxStrokeM, config.unitSystem), 3)} ${lengthUnit(config.unitSystem)}.`
        },
        {
          label: 'Centered static load check',
          value: `${round(toDisplayForce(staticSupportForceN, config.unitSystem), 3)} ${forceUnit(config.unitSystem)}`,
          note: `At level, all three legs are near tableWeight / 3. Maximum neutral-load deviation is ${round(toDisplayForce(centeredLoadError, config.unitSystem), 6)} ${forceUnit(config.unitSystem)}.`
        }
      ];

      const annotateSweepPoint = (entry) => ({
        ...entry,
        selectedMotorFits: sweepPointFitsMotor(entry, selectedMotor.torqueNm),
        selectedMotorUsageRatio: Number.isFinite(entry.requiredMotorTorqueNm) ? entry.requiredMotorTorqueNm / selectedMotor.torqueNm : NaN
      });

      const torqueSweep = [];
      const currentCrank = config.crankRadiusM;
      const sweepMin = Math.max(0.004, currentCrank * 0.45);
      const sweepMax = Math.min(0.4, Math.max(currentCrank * 2.4, minimumCrankRadiusM ? minimumCrankRadiusM * 1.4 : currentCrank * 1.8));
      for (let index = 0; index <= 26; index += 1) {
        const crankRadiusM = sweepMin + ((sweepMax - sweepMin) * index) / 26;
        const trial = annotateSweepPoint(evaluateSweepPoint({ ...config, crankRadiusM }));
        torqueSweep.push({
          crankRadiusM,
          ...trial
        });
      }

      const rodSweep = [];
      const rodRange = sweepBounds(config.rodLengthM, {
        minValue: Math.max(config.crankRadiusM * 3.2, 0.04),
        maxValue: 2,
        lowFactor: 0.65,
        highFactor: 1.85,
        minSpan: 0.05
      });
      for (let index = 0; index <= 22; index += 1) {
        const rodLengthM = rodRange.low + ((rodRange.high - rodRange.low) * index) / 22;
        const trial = annotateSweepPoint(evaluateSweepPoint({ ...config, rodLengthM }));
        rodSweep.push({
          rodLengthM,
          ...trial
        });
      }

      const baseRadiusSweep = [];
      const baseRadiusRange = sweepBounds(config.baseRadiusM, {
        minValue: 0.01,
        maxValue: Math.min(Math.min(config.widthM, config.lengthM) * 0.48, 2),
        lowFactor: 0.55,
        highFactor: 1.55,
        minSpan: 0.02
      });
      for (let index = 0; index <= 20; index += 1) {
        const baseRadiusM = baseRadiusRange.low + ((baseRadiusRange.high - baseRadiusRange.low) * index) / 20;
        const trial = annotateSweepPoint(evaluateSweepPoint({ ...config, baseRadiusM }));
        baseRadiusSweep.push({
          baseRadiusM,
          ...trial
        });
      }

      const supportSweep = [];
      const currentSupport = config.supportRadiusM;
      const supportRange = sweepBounds(currentSupport, {
        minValue: 0.03,
        maxValue: Math.min(Math.min(config.widthM, config.lengthM) * 0.48, 2),
        lowFactor: 0.55,
        highFactor: 1.6,
        minSpan: 0.02
      });
      for (let index = 0; index <= 20; index += 1) {
        const supportRadiusM = supportRange.low + ((supportRange.high - supportRange.low) * index) / 20;
        const trialConfig = { ...config, supportRadiusM };
        const reachableTiltRad = findReachableTilt(trialConfig, headingRad);
        const trial = annotateSweepPoint(evaluateSweepPoint(trialConfig));
        supportSweep.push({
          supportRadiusM,
          reachableTiltDeg: toDegrees(reachableTiltRad),
          ...trial
        });
      }

      const crankFitSweep = torqueSweep.filter((entry) => entry.selectedMotorFits);
      const crankSizingPoint = crankFitSweep.length
        ? chooseNearMinimum(crankFitSweep, (entry) => entry.requiredMotorTorqueNm, (entry) => entry.crankRadiusM)
        : null;

      const rodFitSweep = rodSweep.filter((entry) => entry.selectedMotorFits);
      const comfortableRodSweep = rodFitSweep.filter((entry) => entry.maxRodAngleDeg <= 25);
      const rodSizingPoint = comfortableRodSweep.length
        ? [...comfortableRodSweep].sort((a, b) => a.rodLengthM - b.rodLengthM)[0]
        : rodFitSweep.length
          ? [...rodFitSweep].sort((a, b) => a.maxRodAngleDeg - b.maxRodAngleDeg || a.rodLengthM - b.rodLengthM)[0]
          : null;

      const baseFitSweep = baseRadiusSweep.filter((entry) => entry.selectedMotorFits);
      const baseSizingPoint = baseFitSweep.length
        ? chooseNearMinimum(baseFitSweep, (entry) => entry.requiredMotorTorqueNm, (entry) => Math.abs(entry.baseRadiusM - config.baseRadiusM))
        : null;

      const supportFitSweep = supportSweep.filter((entry) => entry.selectedMotorFits && entry.reachableTiltDeg + 1e-6 >= config.targetTiltDeg);
      const supportSizingPoint = supportFitSweep.length
        ? [...supportFitSweep].sort((a, b) => b.supportRadiusM - a.supportRadiusM)[0]
        : null;

      const sizingGuides = {
        crank: crankSizingPoint
          ? {
            valueM: crankSizingPoint.crankRadiusM,
            tone: 'good',
            note: `One-axis crank sweep with all other inputs fixed. Selected motor uses ${round(crankSizingPoint.selectedMotorUsageRatio * 100, 1)}% of its torque here.`
          }
          : {
            valueM: minimumCrankRadiusM,
            tone: minimumCrankRadiusM ? 'warn' : 'danger',
            note: minimumCrankRadiusM
              ? 'This is the geometric minimum crank that reaches the target tilt, but the selected motor still has no margin in the sampled sweep.'
              : 'No crank length in the sampled range reaches the requested motion with the current fixed geometry.'
          },
        rod: rodSizingPoint
          ? {
            valueM: rodSizingPoint.rodLengthM,
            tone: rodSizingPoint.maxRodAngleDeg <= 25 ? 'good' : 'warn',
            note: rodSizingPoint.maxRodAngleDeg <= 25
              ? `Shortest rod in the sweep that keeps peak rod angle at or below ${round(rodSizingPoint.maxRodAngleDeg, 1)}°.`
              : `Selected motor only works with steeper rod posture. Best sampled rod angle is ${round(rodSizingPoint.maxRodAngleDeg, 1)}°.`
          }
          : {
            valueM: null,
            tone: 'danger',
            note: 'No rod length in the sampled range both meets the target motion and stays within the selected motor torque.'
          },
        baseRadius: baseSizingPoint
          ? {
            valueM: baseSizingPoint.baseRadiusM,
            tone: 'good',
            note: `Best motor-radius sweep point for torque demand. Selected motor uses ${round(baseSizingPoint.selectedMotorUsageRatio * 100, 1)}% of its torque there.`
          }
          : {
            valueM: null,
            tone: 'danger',
            note: 'No motor radius in the sampled range meets the requested motion with the selected motor while other inputs stay fixed.'
          },
        supportRadius: supportSizingPoint
          ? {
            valueM: supportSizingPoint.supportRadiusM,
            tone: 'good',
            note: `Largest sampled mounting radius that still reaches ${round(supportSizingPoint.reachableTiltDeg, 2)}° with the selected motor.`
          }
          : {
            valueM: null,
            tone: 'danger',
            note: 'No sampled mounting radius both reaches the target tilt and stays within the selected motor torque.'
          }
      };

      return {
        ...config,
        massKg,
        weightN,
        inertia,
        targetTiltRad,
        headingRad,
        alphaMagnitude,
        supportPoints,
        basePoints,
        supportPlaneCenterHeightM,
        requiredSupportStrokeM,
        tanApproxStrokeM,
        sinApproxStrokeM,
        strokeBounds,
        motorClearance,
        supportClearance,
        samples,
        trajectoryValid,
        warnings,
        validations,
        staticSupportForceN,
        peakDynamicSupportForce,
        peakDynamicAxialForce,
        peakDynamicTorque,
        staticHoldTorqueNm,
        staticHoldAxialForceN,
        dynamicSizingTorqueNm,
        recommendedTorqueNm,
        selectedMotor,
        selectedMotorUsageRatio,
        selectedMotorCanDrive,
        recommendedMotorOption,
        motorOptionRows,
        actualReachableTiltRad,
        actualReachableTiltDeg: toDegrees(actualReachableTiltRad),
        minimumCrankRadiusM,
        legPeakTorque,
        legPeakForce,
        neutralPose,
        finalPose,
        staticLegRows,
        highestForce,
        lowestForce,
        maxRodAngleDeg,
        minTravelPerRad,
        torqueSweep,
        rodSweep,
        baseRadiusSweep,
        sizingGuides,
        supportSweep
      };
    }

    function evaluateSweepPoint(config) {
      const massKg = config.massMode === 'density'
        ? config.densityKgM3 * config.widthM * config.lengthM * config.thicknessM
        : config.massKg;
      const weightN = massKg * G;
      const targetTiltRad = toRadians(config.targetTiltDeg);
      const headingRad = toRadians(config.headingDeg);
      const inertia = inertiaRectPrism(massKg, config.widthM, config.lengthM, config.thicknessM);
      let previousBetas = [];
      let peakTorqueNm = 0;
      let maxRodAngleDeg = 0;
      const axis = { x: -Math.sin(headingRad), y: Math.cos(headingRad) };
      for (let index = 0; index <= 34; index += 1) {
        const progress = index / 34;
        const motion = motionStateAtProgress(progress, config.moveTimeS, targetTiltRad);
        const pose = solvePose(config, motion.thetaRad, headingRad, previousBetas);
        if (!pose.valid) {
          return {
            feasible: false,
            peakTorqueNm: null,
            requiredMotorTorqueNm: null,
            maxRodAngleDeg: null
          };
        }
        previousBetas = pose.legs.map((leg) => leg.beta);
        const momentX = inertia.Ixx * axis.x * motion.alphaRadS2;
        const momentY = inertia.Iyy * axis.y * motion.alphaRadS2;
        const loads = supportForcesForMoment(pose.topPoints, pose.comPoint, weightN, momentX, momentY);
        if (!loads) {
          return {
            feasible: false,
            peakTorqueNm: null,
            requiredMotorTorqueNm: null,
            maxRodAngleDeg: null
          };
        }
        pose.legs.forEach((leg, legIndex) => {
          peakTorqueNm = Math.max(peakTorqueNm, Math.abs(loads[legIndex] * leg.dzdBeta));
          maxRodAngleDeg = Math.max(maxRodAngleDeg, leg.rodAngleDeg);
        });
      }
      return {
        feasible: true,
        peakTorqueNm,
        requiredMotorTorqueNm: requiredMotorTorque(peakTorqueNm, config.safetyFactor),
        maxRodAngleDeg
      };
    }

    function formatLength(meters, unitSystem, digits = 2) {
      return `${round(toDisplayLength(meters, unitSystem), digits)} ${lengthUnit(unitSystem)}`;
    }

    function formatForce(newtons, unitSystem, digits = 2) {
      return `${round(toDisplayForce(newtons, unitSystem), digits)} ${forceUnit(unitSystem)}`;
    }

    function formatTorque(nm, unitSystem, digits = 2) {
      return `${round(toDisplayTorque(nm, unitSystem), digits)} ${torqueUnit(unitSystem)}`;
    }

    function sceneVectorFromModel(THREE, x, y, z) {
      return new THREE.Vector3(x, z, y);
    }

    function disposeThreeObject(object) {
      if (!object) {
        return;
      }
      object.traverse((node) => {
        if (node.geometry) {
          node.geometry.dispose();
        }
        if (node.material) {
          if (Array.isArray(node.material)) {
            node.material.forEach((material) => material.dispose());
          } else {
            node.material.dispose();
          }
        }
      });
    }

    function createCylinderBetweenPoints(THREE, start, end, radius, options = {}) {
      const direction = new THREE.Vector3().subVectors(end, start);
      const length = direction.length();
      const geometry = new THREE.CylinderGeometry(radius, radius, Math.max(length, 1e-5), options.segments ?? 18);
      const material = new THREE.MeshStandardMaterial({
        color: options.color ?? 0xffffff,
        roughness: options.roughness ?? 0.45,
        metalness: options.metalness ?? 0.18,
        transparent: options.opacity !== undefined && options.opacity < 1,
        opacity: options.opacity ?? 1
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(start).add(end).multiplyScalar(0.5);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());
      return mesh;
    }

    function currentTableNormal(THREE, sample) {
      if (!sample?.pose?.topPoints?.length || sample.pose.topPoints.length < 3) {
        return new THREE.Vector3(0, 1, 0);
      }
      const p0 = sceneVectorFromModel(THREE, sample.pose.topPoints[0].x, sample.pose.topPoints[0].y, sample.pose.topPoints[0].z);
      const p1 = sceneVectorFromModel(THREE, sample.pose.topPoints[1].x, sample.pose.topPoints[1].y, sample.pose.topPoints[1].z);
      const p2 = sceneVectorFromModel(THREE, sample.pose.topPoints[2].x, sample.pose.topPoints[2].y, sample.pose.topPoints[2].z);
      const normal = new THREE.Vector3().subVectors(p1, p0).cross(new THREE.Vector3().subVectors(p2, p0)).normalize();
      if (normal.y < 0) {
        normal.multiplyScalar(-1);
      }
      return normal;
    }

    function legWorldPoints(THREE, model, sample, legIndex) {
      if (!sample?.legs?.[legIndex]) {
        return null;
      }
      const leg = sample.legs[legIndex];
      const basePoint = model.basePoints[legIndex];
      const topPoint = sample.pose.topPoints[legIndex];
      const phi = basePoint.phi;
      const shaft = sceneVectorFromModel(THREE, basePoint.x, basePoint.y, model.shaftHeightM);
      const crankPin = sceneVectorFromModel(
        THREE,
        basePoint.x + Math.cos(phi) * leg.crankX,
        basePoint.y + Math.sin(phi) * leg.crankX,
        model.shaftHeightM + leg.crankZ
      );
      const support = sceneVectorFromModel(THREE, topPoint.x, topPoint.y, topPoint.z);
      return { shaft, crankPin, support, leg };
    }

    function downhillSceneVector(THREE, headingRad, thetaRad) {
      return new THREE.Vector3(Math.cos(headingRad), -Math.tan(thetaRad), Math.sin(headingRad)).normalize();
    }

    function ScaleChart({ title, subtitle, xLabel, yLabel, data, xAccessor, yAccessor, currentX, currentY, unitSystem, xFormatter, yFormatter }) {
      const width = 520;
      const height = 240;
      const margin = { top: 20, right: 18, bottom: 40, left: 54 };
      const plotWidth = width - margin.left - margin.right;
      const plotHeight = height - margin.top - margin.bottom;
      const valid = data.filter((entry) => Number.isFinite(yAccessor(entry)));
      const xValues = data.map(xAccessor);
      const yValues = valid.map(yAccessor);
      const xMin = Math.min(...xValues);
      const xMax = Math.max(...xValues);
      const yMin = Math.min(...yValues, 0);
      const yMax = Math.max(...yValues, 1e-6);

      const xToPx = (value) => margin.left + ((value - xMin) / Math.max(xMax - xMin, 1e-9)) * plotWidth;
      const yToPx = (value) => margin.top + plotHeight - ((value - yMin) / Math.max(yMax - yMin, 1e-9)) * plotHeight;

      const path = valid.map((entry, index) => `${index === 0 ? 'M' : 'L'} ${xToPx(xAccessor(entry))} ${yToPx(yAccessor(entry))}`).join(' ');
      const currentPoint = Number.isFinite(currentY) ? { x: xToPx(currentX), y: yToPx(currentY) } : null;
      const ticks = 4;
      const xTicks = Array.from({ length: ticks + 1 }, (_, index) => xMin + ((xMax - xMin) * index) / ticks);
      const yTicks = Array.from({ length: ticks + 1 }, (_, index) => yMin + ((yMax - yMin) * index) / ticks);

      return (
        <div className="sim-panel">
          <div className="sim-panel-header">
            <h3>{title}</h3>
            <p>{subtitle}</p>
          </div>
          <div className="svg-host">
            <svg viewBox={`0 0 ${width} ${height}`} role="img" aria-label={title}>
              <rect x="0" y="0" width={width} height={height} fill="rgba(16, 19, 24, 0.82)" rx="14" />
              {yTicks.map((tick, index) => (
                <g key={`y-${index}`}>
                  <line x1={margin.left} y1={yToPx(tick)} x2={width - margin.right} y2={yToPx(tick)} stroke="rgba(255,255,255,0.08)" strokeDasharray="4 4" />
                  <text x={margin.left - 10} y={yToPx(tick) + 4} textAnchor="end" fill="var(--text-dim)" fontSize="11">{yFormatter(tick)}</text>
                </g>
              ))}
              {xTicks.map((tick, index) => (
                <g key={`x-${index}`}>
                  <line x1={xToPx(tick)} y1={margin.top} x2={xToPx(tick)} y2={margin.top + plotHeight} stroke="rgba(255,255,255,0.05)" />
                  <text x={xToPx(tick)} y={height - 14} textAnchor="middle" fill="var(--text-dim)" fontSize="11">{xFormatter(tick)}</text>
                </g>
              ))}
              <path d={path} fill="none" stroke="var(--vertical)" strokeWidth="3" strokeLinejoin="round" strokeLinecap="round" />
              {currentPoint ? (
                <>
                  <line x1={currentPoint.x} y1={margin.top} x2={currentPoint.x} y2={margin.top + plotHeight} stroke="var(--accent)" strokeDasharray="5 4" />
                  <circle cx={currentPoint.x} cy={currentPoint.y} r="5.5" fill="var(--accent)" stroke="rgba(16,19,24,0.95)" strokeWidth="2" />
                </>
              ) : null}
              <text x={margin.left + plotWidth / 2} y={height - 4} fill="var(--text-dim)" fontSize="12" textAnchor="middle">{xLabel}</text>
              <text x="18" y={margin.top + plotHeight / 2} fill="var(--text-dim)" fontSize="12" textAnchor="middle" transform={`rotate(-90 18 ${margin.top + plotHeight / 2})`}>{yLabel}</text>
            </svg>
          </div>
        </div>
      );
    }

    function TopView({ model, displaySample }) {
      const width = 420;
      const height = 420;
      const padding = 36;
      const extent = Math.max(model.widthM, model.lengthM, model.baseRadiusM * 2.4, model.supportRadiusM * 2.4);
      const scale = (Math.min(width, height) - padding * 2) / Math.max(extent, 1e-6);
      const cx = width / 2;
      const cy = height / 2;
      const legHeights = displaySample ? displaySample.legs.map((leg) => leg.topZ - model.supportPlaneCenterHeightM) : [0, 0, 0];
      const minH = Math.min(...legHeights);
      const maxH = Math.max(...legHeights);
      const colorForHeight = (value) => {
        const normalized = (value - minH) / Math.max(maxH - minH, 1e-9);
        const hue = 215 - normalized * 120;
        return `hsl(${hue}, 85%, 62%)`;
      };
      const headingLength = Math.min(model.widthM, model.lengthM) * 0.22;
      const arrowX = Math.cos(model.headingRad) * headingLength * scale;
      const arrowY = Math.sin(model.headingRad) * headingLength * scale;

      return (
        <div className="sim-panel">
          <div className="sim-panel-header">
            <h3>Top View</h3>
            <p>Base motor radius, mounting radius, footprint clearance, and tilt heading all share the same plan view.</p>
          </div>
          <div className="svg-host">
            <svg viewBox={`0 0 ${width} ${height}`} role="img" aria-label="Top view">
              <rect x="0" y="0" width={width} height={height} fill="rgba(16,19,24,0.84)" rx="18" />
              <rect
                x={cx - (model.widthM * scale) / 2}
                y={cy - (model.lengthM * scale) / 2}
                width={model.widthM * scale}
                height={model.lengthM * scale}
                rx="10"
                fill="rgba(255,255,255,0.02)"
                stroke="rgba(255,255,255,0.16)"
              />
              <circle cx={cx} cy={cy} r={model.baseRadiusM * scale} fill="none" stroke="rgba(156, 222, 116, 0.45)" strokeDasharray="6 5" />
              <circle cx={cx} cy={cy} r={model.supportRadiusM * scale} fill="none" stroke="rgba(99, 196, 255, 0.5)" strokeDasharray="6 5" />
              <line x1={cx - 10} y1={cy} x2={cx + 10} y2={cy} stroke="rgba(255,255,255,0.25)" />
              <line x1={cx} y1={cy - 10} x2={cx} y2={cy + 10} stroke="rgba(255,255,255,0.25)" />
              <defs>
                <marker id="heading-arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
                  <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent)" />
                </marker>
              </defs>
              <line x1={cx} y1={cy} x2={cx + arrowX} y2={cy + arrowY} stroke="var(--accent)" strokeWidth="3" markerEnd="url(#heading-arrow)" />
              <text x={cx + arrowX + 10} y={cy + arrowY + 4} fill="var(--accent)" fontSize="12" fontFamily="JetBrains Mono, monospace">tilt heading</text>

              {model.basePoints.map((point, index) => (
                <g key={`motor-${index}`}>
                  <circle cx={cx + point.x * scale} cy={cy + point.y * scale} r="9" fill="rgba(156, 222, 116, 0.9)" stroke="rgba(16,19,24,0.9)" strokeWidth="2" />
                  <text x={cx + point.x * scale} y={cy + point.y * scale + 23} textAnchor="middle" fill="var(--text-dim)" fontSize="11">M{index + 1}</text>
                </g>
              ))}

              {model.supportPoints.map((point, index) => (
                <g key={`support-${index}`}>
                  <circle cx={cx + point.x * scale} cy={cy + point.y * scale} r="7" fill={colorForHeight(legHeights[index])} stroke="rgba(16,19,24,0.9)" strokeWidth="2" />
                  <text x={cx + point.x * scale} y={cy + point.y * scale - 14} textAnchor="middle" fill="var(--text)" fontSize="11">S{index + 1}</text>
                </g>
              ))}

              <text x={18} y={26} fill="var(--text-dim)" fontSize="12">Table footprint: {formatLength(model.widthM, model.unitSystem)} × {formatLength(model.lengthM, model.unitSystem)}</text>
              <text x={18} y={44} fill="var(--text-dim)" fontSize="12">Motor radius: {formatLength(model.baseRadiusM, model.unitSystem)} | Mounting radius: {formatLength(model.supportRadiusM, model.unitSystem)}</text>
              <text x={18} y={62} fill="var(--text-dim)" fontSize="12">Edge clearance: motors {formatLength(model.motorClearance, model.unitSystem)} | supports {formatLength(model.supportClearance, model.unitSystem)}</text>
            </svg>
          </div>
        </div>
      );
    }

    function PlaneSectionView({ model, displaySample }) {
      const width = 480;
      const height = 280;
      const padding = 28;
      const sectionSpan = model.supportRadiusM * 2;
      const maxDelta = Math.max(model.requiredSupportStrokeM * 1.5, 0.001);
      const xToPx = (x) => padding + ((x + sectionSpan / 2) / Math.max(sectionSpan, 1e-6)) * (width - padding * 2);
      const yToPx = (z) => height - padding - ((z - (model.neutralHeightM - maxDelta * 1.25)) / Math.max(maxDelta * 2.5, 1e-6)) * (height - padding * 2);
      const downhill = { x: Math.cos(model.headingRad), y: Math.sin(model.headingRad) };
      const projections = model.supportPoints.map((point, index) => ({
        index,
        s: point.x * downhill.x + point.y * downhill.y,
        z: displaySample ? displaySample.pose.topPoints[index].z : model.supportPlaneCenterHeightM
      })).sort((a, b) => a.s - b.s);

      return (
        <div className="sim-panel">
          <div className="sim-panel-header">
            <h3>Plane Section</h3>
            <p>Height difference between the three support points along the commanded downhill direction.</p>
          </div>
          <div className="svg-host">
            <svg viewBox={`0 0 ${width} ${height}`} role="img" aria-label="Plane section">
              <rect x="0" y="0" width={width} height={height} fill="rgba(16,19,24,0.84)" rx="14" />
              <line x1={padding} y1={yToPx(model.supportPlaneCenterHeightM)} x2={width - padding} y2={yToPx(model.supportPlaneCenterHeightM)} stroke="rgba(255,255,255,0.12)" strokeDasharray="5 4" />
              <text x={padding} y={yToPx(model.supportPlaneCenterHeightM) - 8} fill="var(--text-dim)" fontSize="11">neutral underside support plane</text>

              {projections.map((point) => (
                <g key={point.index}>
                  <line x1={xToPx(point.s)} y1={height - padding} x2={xToPx(point.s)} y2={yToPx(point.z)} stroke="rgba(255,255,255,0.14)" />
                  <circle cx={xToPx(point.s)} cy={yToPx(point.z)} r="7" fill="var(--vertical)" />
                  <text x={xToPx(point.s)} y={yToPx(point.z) - 14} textAnchor="middle" fill="var(--text)" fontSize="11">S{point.index + 1}</text>
                </g>
              ))}

              <polyline
                points={projections.map((point) => `${xToPx(point.s)},${yToPx(point.z)}`).join(' ')}
                fill="none"
                stroke="var(--accent)"
                strokeWidth="4"
                strokeLinejoin="round"
                strokeLinecap="round"
              />

              <text x={padding} y={height - 10} fill="var(--text-dim)" fontSize="12">Projected support position along heading</text>
            </svg>
          </div>
        </div>
      );
    }

    function LegView({ model, displaySample }) {
      const width = 480;
      const height = 280;
      const pad = 24;
      if (!displaySample || !displaySample.legs?.length) {
        return null;
      }
      const leg = displaySample.legs[0];
      const shaftX = 0;
      const shaftZ = model.shaftHeightM;
      const topX = leg.localDx;
      const topZ = leg.topZ - model.shaftHeightM;
      const minX = Math.min(shaftX - model.crankRadiusM * 1.5, topX - model.crankRadiusM * 1.3);
      const maxX = Math.max(shaftX + model.crankRadiusM * 1.6, topX + model.crankRadiusM * 1.2);
      const minZ = Math.min(-model.crankRadiusM * 1.2, topZ - model.rodLengthM * 0.3);
      const maxZ = Math.max(topZ + model.crankRadiusM * 0.8, model.neutralHeightM - model.shaftHeightM + model.requiredSupportStrokeM);
      const scale = Math.min((width - pad * 2) / Math.max(maxX - minX, 1e-6), (height - pad * 2) / Math.max(maxZ - minZ, 1e-6));
      const xToPx = (x) => pad + (x - minX) * scale;
      const yToPx = (z) => height - pad - (z - minZ) * scale;

      return (
        <div className="sim-panel">
          <div className="sim-panel-header">

          <div className="svg-host">
            <svg viewBox={`0 0 ${width} ${height}`} role="img" aria-label="Representative leg">
              <rect x="0" y="0" width={width} height={height} fill="rgba(16,19,24,0.84)" rx="14" />
              <line x1={pad} y1={yToPx(0)} x2={width - pad} y2={yToPx(0)} stroke="rgba(255,255,255,0.08)" />
              <text x={pad} y={yToPx(0) - 8} fill="var(--text-dim)" fontSize="11">motor shaft height datum</text>

              <line x1={xToPx(topX)} y1={pad} x2={xToPx(topX)} y2={height - pad} stroke="rgba(255,255,255,0.06)" />
              <circle cx={xToPx(shaftX)} cy={yToPx(shaftZ - model.shaftHeightM)} r="10" fill="rgba(156,222,116,0.88)" stroke="rgba(16,19,24,0.9)" strokeWidth="2" />
              <line x1={xToPx(shaftX)} y1={yToPx(shaftZ - model.shaftHeightM)} x2={xToPx(leg.crankX)} y2={yToPx(leg.crankZ)} stroke="var(--accent)" strokeWidth="5" strokeLinecap="round" />
              <line x1={xToPx(leg.crankX)} y1={yToPx(leg.crankZ)} x2={xToPx(topX)} y2={yToPx(topZ)} stroke="var(--vertical)" strokeWidth="4" strokeLinecap="round" />
              <circle cx={xToPx(leg.crankX)} cy={yToPx(leg.crankZ)} r="7" fill="var(--accent)" />

    function sceneCameraDirection(THREE, preset, headingRad) {
      if (preset === 'top') {

      if (preset === 'downhill') {
        return new THREE.Vector3(Math.cos(headingRad) * 1.3, 0.42, Math.sin(headingRad) * 1.3).normalize();

      return new THREE.Vector3(1.25, 0.82, 1.1).normalize();

        meta: LEG_META[index],
        supportDeltaM: leg.topZ - model.supportPlaneCenterHeightM,
